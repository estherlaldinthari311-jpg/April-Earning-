    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #fff; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        button, input, select, nav { position: relative !important; z-index: 100 !important; cursor: pointer !important; }
        
        .premium-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(197, 160, 89, 0.1); backdrop-filter: blur(15px); border-radius: 20px; }
        .classic-gold { background: linear-gradient(135deg, #c5a059, #8e6d2f); color: #000; }
        .hidden-section { display: none !important; }
        .nav-active { color: #c5a059; transform: scale(1.1); }
        
        /* AUTH SLIDER */
        .auth-container { width: 100%; max-width: 360px; min-height: 500px; overflow: hidden; margin: auto; }
        .auth-slider { display: flex; width: 200%; transition: 0.5s ease; }
        .auth-form { width: 50%; padding: 25px; }
        .show-register .auth-slider { transform: translateX(-50%); }

        /* LEADERBOARD DESIGN */
        .rank-1 { background: linear-gradient(90deg, rgba(197, 160, 89, 0.25), transparent); border-left: 4px solid #ffd700; }
        .rank-2 { border-left: 4px solid #c0c0c0; }
        .rank-3 { border-left: 4px solid #cd7f32; }

        #timer-box { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 200; border-radius: 20px; }
        .timer-active #timer-box { display: flex; }
        
        .claimed-btn { background: rgba(255,255,255,0.05) !important; color: #555 !important; border: 1px dashed #333 !important; }
    </style>
</head>
<body>

    <section id="auth-page" class="min-h-screen flex items-center justify-center p-4">
        <div id="auth-wrap" class="premium-card auth-container shadow-2xl">
            <div class="flex bg-white/5">
                <button onclick="switchAuth(false)" class="flex-1 py-4 font-bold text-[10px] uppercase">Login</button>
                <button onclick="switchAuth(true)" class="flex-1 py-4 font-bold text-[10px] uppercase text-yellow-500">Register</button>
            </div>
            <div class="auth-slider">
                <div class="auth-form space-y-6 pt-10">
                    <h2 class="text-3xl font-black text-center text-yellow-500">SIGN IN</h2>
                    <input type="email" id="l-email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <button onclick="handleAuth(true)" class="w-full classic-gold py-4 rounded-xl font-black uppercase">Login</button>
                </div>
                <div class="auth-form space-y-4 pt-10">
                    <h2 class="text-2xl font-black text-center text-yellow-500 uppercase">Sign Up</h2>
                    <input type="email" id="r-email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <input type="password" id="r-pass" placeholder="Create Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <input type="text" id="refBy" placeholder="Referral Code (Optional)" class="w-full bg-white/10 p-4 rounded-xl border border-yellow-500/30 text-yellow-500 outline-none">
                    <button onclick="handleAuth(false)" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase">Create Account</button>
                </div>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section pb-28">
        <div class="flex justify-center p-2 bg-[#050507]">
            <script type="text/javascript">
                atOptions = { 'key' : '519ceac42444d69ac28ec1621467ee97', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
            </script>
            <script type="text/javascript" src="https://landslidegraphsystems.com/519ceac42444d69ac28ec1621467ee97/invoke.js"></script>
        </div>

        <header class="p-6 flex justify-between items-center sticky top-0 bg-[#050507]/90 backdrop-blur-lg z-50">
            <h1 class="text-xl font-black italic text-yellow-500">APRIL EARNING</h1>
            <div class="bg-white/5 px-4 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
                <i class="fas fa-coins text-yellow-500 text-xs"></i>
                <span id="balance" class="font-bold text-sm">0</span>
            </div>
        </header>

        <section id="home-tab" class="px-6 animate__animated animate__fadeIn">
            <button id="daily-btn" onclick="claimDaily()" class="w-full premium-card p-4 mb-6 flex justify-between items-center border-l-4 border-yellow-500">
                <div class="text-left"><p class="font-bold text-sm">Daily Reward</p><p class="text-[10px] text-gray-500">+5 Coins Every 24h</p></div>
                <i id="daily-icon" class="fas fa-gift text-yellow-500"></i>
            </button>

            <div id="captcha-box-wrap" class="premium-card p-6 text-center relative overflow-hidden">
                <div id="timer-box">
                    <div class="text-center"><p class="text-4xl font-black text-yellow-500" id="timer-sec">15</p><p class="text-[9px] uppercase tracking-widest">Syncing Data...</p></div>
                </div>
                <div class="bg-black/50 py-8 rounded-2xl mb-4 border border-white/5 relative">
                    <span id="captcha-code" class="text-4xl font-black tracking-[8px] opacity-20 italic">LOAD...</span>
                    <button onclick="generateCaptcha()" class="absolute top-2 right-2 text-gray-600"><i class="fas fa-sync"></i></button>
                </div>
                <input type="text" id="user-input" placeholder="Enter Captcha Code" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-center font-bold mb-4 outline-none uppercase">
                <button onclick="processCaptcha()" class="w-full classic-gold py-4 rounded-xl font-black shadow-lg uppercase">Claim 1.5 Coins</button>
            </div>

            <div class="mt-6 space-y-3">
                <button onclick="joinSocial('tg')" class="w-full premium-card p-4 flex justify-between items-center border-l-4 border-sky-500">
                    <span class="text-xs font-bold uppercase">Join Telegram Group</span>
                    <span id="tg-btn" class="bg-sky-600 px-4 py-1 rounded-lg text-[10px] font-bold">JOIN +20</span>
                </button>
                <button onclick="joinSocial('ig')" class="w-full premium-card p-4 flex justify-between items-center border-l-4 border-pink-500">
                    <span class="text-xs font-bold uppercase">Follow Instagram</span>
                    <span id="ig-btn" class="bg-pink-600 px-4 py-1 rounded-lg text-[10px] font-bold">FOLLOW +20</span>
                </button>
            </div>

            <div class="mt-10">
                <p class="text-[10px] font-black text-gray-500 uppercase mb-4 text-center tracking-widest">Top 3 Rankers</p>
                <div id="leaderboard" class="space-y-3"></div>
            </div>
        </section>

        <section id="refer-tab" class="hidden-section px-6 animate__animated animate__fadeIn">
            <h2 class="text-2xl font-black mb-6">Partner Program</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="premium-card p-4 text-center"><p class="text-[9px] text-gray-500 uppercase">Direct Invites</p><p id="inv-count" class="text-xl font-black">0</p></div>
                <div class="premium-card p-4 text-center"><p class="text-[9px] text-gray-500 uppercase">Comm. Earned</p><p id="comm-count" class="text-xl font-black text-yellow-500">0.0</p></div>
            </div>
            <div class="premium-card p-6 text-center mb-6 border-dashed border-yellow-500/20">
                <p class="text-[10px] text-gray-500 mb-4 italic uppercase">Your Invitation Link</p>
                <div class="bg-black/40 p-3 rounded-xl mb-4 truncate text-[9px] font-mono border border-white/5" id="share-link">...</div>
                <button onclick="copyLink()" class="w-full bg-white text-black py-4 rounded-xl font-bold text-xs uppercase shadow-xl">Copy Link</button>
            </div>
            <div class="premium-card p-6">
                <p class="text-xs font-bold mb-4 text-center text-yellow-500 uppercase">Redeem Gift Code</p>
                <div class="flex gap-2">
                    <input type="text" id="gift-code" placeholder="Enter Code" class="flex-1 bg-white/5 border border-white/10 p-3 rounded-xl outline-none text-xs">
                    <button onclick="redeemGift()" class="classic-gold px-6 py-3 rounded-xl font-bold text-xs uppercase">Redeem</button>
                </div>
            </div>
        </section>

        <section id="wallet-tab" class="hidden-section px-6 animate__animated animate__fadeIn">
            <h2 class="text-2xl font-black mb-4">Payouts</h2>
            
            <div class="premium-card p-4 mb-6 bg-red-500/5 border-red-500/20">
                <div class="flex items-start gap-3">
                    <i class="fas fa-shield-halved text-red-500 mt-1"></i>
                    <div class="space-y-1">
                        <p class="text-[11px] font-black uppercase text-red-500">Withdrawal Policy</p>
                        <p class="text-[10px] text-gray-400">1. At least <b>2 Active Invites</b> required.</p>
                        <p class="text-[10px] text-gray-400">2. Maximum <b>3 Withdrawals</b> per 24 hours.</p>
                    </div>
                </div>
            </div>

            <div class="premium-card p-6 space-y-4">
                <input type="text" id="upi" placeholder="Enter UPI ID (e.g. name@paytm)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none text-sm">
                <select id="w-amt" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none text-sm">
                    <option value="1000">1,000 Coins (₹30)</option>
                    <option value="5000">5,000 Coins (₹150)</option>
                    <option value="10000">10,000 Coins (₹300)</option>
                </select>
                <button onclick="handleWithdraw()" class="w-full classic-gold py-4 rounded-xl font-black uppercase shadow-lg">Request Withdrawal</button>
            </div>
            <div id="wdr-history" class="mt-8 space-y-2 pb-6"></div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#050507]/95 border-t border-white/5 p-4 flex justify-around items-center z-[150] rounded-t-3xl backdrop-blur-xl shadow-2xl">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active text-xl"><i class="fas fa-house"></i></button>
            <button onclick="showTab('refer-tab')" id="n-refer" class="text-gray-600 text-xl"><i class="fas fa-users"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-600 text-xl"><i class="fas fa-wallet"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            authDomain: "arpi-earning.firebaseapp.com",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning",
            storageBucket: "arpi-earning.firebasestorage.app",
            messagingSenderId: "427035865345",
            appId: "1:427035865345:web:2c207e1417a49e14a22b00"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "";
        let userData = {};

        window.onload = () => {
            generateCaptcha();
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            if(ref) { switchAuth(true); document.getElementById('refBy').value = ref; }

            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
            loadLeaderboard();
        };

        function switchAuth(isReg) { document.getElementById('auth-wrap').classList.toggle('show-register', isReg); }

        function handleAuth(isLogin) {
            const email = isLogin ? document.getElementById('l-email').value : document.getElementById('r-email').value;
            const pass = isLogin ? document.getElementById('l-pass').value : document.getElementById('r-pass').value;
            const ref = document.getElementById('refBy').value.trim();
            if(!email || !pass) return alert("Please fill all details.");

            const key = email.replace(/[.#$[\]]/g, "_");
            database.ref('users/' + key).once('value', snap => {
                if(isLogin) {
                    if(snap.exists() && snap.val().password === pass) {
                        currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                    } else alert("Invalid Credentials!");
                } else {
                    if(snap.exists()) return alert("User already exists!");
                    database.ref('users/' + key).set({ password: pass, balance: 55, invites: 0, invitedBy: ref, comm: 0, lastClaim: 0 });
                    if(ref && ref !== key) {
                        database.ref('users/' + ref).once('value', s => {
                            if(s.exists()) database.ref('users/' + ref).update({ invites: (s.val().invites||0)+1, balance: (s.val().balance||0)+10 });
                        });
                    }
                    currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('share-link').innerText = window.location.origin + window.location.pathname + "?ref=" + currentUser;
            syncData();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val();
                document.getElementById('balance').innerText = Math.floor(userData.balance);
                document.getElementById('inv-count').innerText = userData.invites || 0;
                document.getElementById('comm-count').innerText = (userData.comm || 0).toFixed(1);
                
                // UPDATE DAILY CLAIM UI
                const now = Date.now();
                const btn = document.getElementById('daily-btn');
                const icon = document.getElementById('daily-icon');
                if(now - (userData.lastClaim || 0) < 86400000) {
                    btn.classList.add('claimed-btn');
                    btn.querySelector('p').innerText = "Claimed";
                    btn.querySelector('p:last-child').innerText = "Next available in 24h";
                    icon.className = "fas fa-check-circle text-gray-500";
                }
            });
        }

        function generateCaptcha() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let res = "";
            for(let i=0; i<6; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        function processCaptcha() {
            const input = document.getElementById('user-input').value.toUpperCase();
            if(input === document.getElementById('captcha-code').innerText) {
                document.getElementById('captcha-box-wrap').classList.add('timer-active');
                let sec = 15;
                const t = setInterval(() => {
                    sec--; document.getElementById('timer-sec').innerText = sec;
                    if(sec <= 0) { clearInterval(t); document.getElementById('captcha-box-wrap').classList.remove('timer-active'); }
                }, 1000);

                window.location.href = "https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e";
                database.ref('users/' + currentUser).update({ balance: userData.balance + 1.5 });
                if(userData.invitedBy) {
                    database.ref('users/' + userData.invitedBy).once('value', s => {
                        if(s.exists()) database.ref('users/' + userData.invitedBy).update({ balance: (s.val().balance||0)+0.3, comm: (s.val().comm||0)+0.3 });
                    });
                }
                generateCaptcha(); document.getElementById('user-input').value = "";
            } else alert("Invalid Captcha!");
        }

        function loadLeaderboard() {
            database.ref('users').orderByChild('balance').limitToLast(3).on('value', snap => {
                const lb = document.getElementById('leaderboard'); lb.innerHTML = "";
                let p = []; snap.forEach(s => p.push({n: s.key.split('_')[0], b: s.val().balance}));
                p.reverse().forEach((x, i) => {
                    const badge = i===0 ? '🥇 GOLD' : (i===1 ? '🥈 SILVER' : '🥉 BRONZE');
                    const rankClass = i===0 ? 'rank-1' : (i===1 ? 'rank-2' : 'rank-3');
                    lb.innerHTML += `<div class="${rankClass} premium-card p-4 flex justify-between items-center animate__animated animate__fadeInUp">
                        <div class="flex flex-col"><span class="text-[9px] font-black tracking-widest text-gray-500">${badge}</span><span class="font-black text-xs uppercase">${x.n}</span></div>
                        <div class="text-right"><span class="text-[9px] text-gray-500 block">POINTS</span><b class="text-yellow-500 text-xs">${Math.floor(x.b)}</b></div>
                    </div>`;
                });
            });
        }

        function handleWithdraw() {
            if(userData.invites < 2) return alert("Security Check: You need at least 2 invites to withdraw.");
            window.location.href = "https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e";
            alert("Withdrawal Requested! Processing takes up to 24 hours.");
        }

        function claimDaily() {
            const now = Date.now();
            if(now - (userData.lastClaim||0) < 86400000) return alert("You have already claimed your daily reward!");
            database.ref('users/' + currentUser).update({ balance: userData.balance + 5, lastClaim: now });
            alert("5 Coins claimed successfully!");
        }

        function showTab(id) {
            ['home-tab', 'refer-tab', 'wallet-tab'].forEach(t => document.getElementById(t).classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b
