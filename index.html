<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APRIL EARNING</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #050507; 
            color: #fff; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* HMEH THEI LO FIX - LAYER CHUNG BER */
        #auth-page, #main-app, nav, button, input {
            position: relative !important;
            z-index: 9999 !important;
            pointer-events: auto !important;
            cursor: pointer !important;
        }

        /* ADS DALTU FIX */
        iframe, .ads-container {
            pointer-events: none !important; /* Ads kha a hmeh tlang theih turin */
            z-index: 1 !important;
        }

        .premium-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(197, 160, 89, 0.1); backdrop-filter: blur(15px); border-radius: 20px; }
        .classic-gold { background: linear-gradient(135deg, #c5a059, #8e6d2f); color: #000; }
        .hidden-section { display: none !important; }
        .nav-active { color: #c5a059; transform: scale(1.1); }
        
        .auth-container { width: 100%; max-width: 360px; min-height: 500px; overflow: hidden; margin: auto; }
        .auth-slider { display: flex; width: 200%; transition: 0.5s ease; }
        .auth-form { width: 50%; padding: 25px; }
        .show-register .auth-slider { transform: translateX(-50%); }

        #timer-box { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; border-radius: 20px; }
        .timer-active #timer-box { display: flex; }
    </style>
</head>
<body>

    <section id="auth-page" class="min-h-screen flex items-center justify-center p-4">
        <div id="auth-wrap" class="premium-card auth-container">
            <div class="flex bg-white/5 border-b border-white/5">
                <button onclick="switchAuth(false)" class="flex-1 py-4 font-bold text-[10px] uppercase">Login</button>
                <button onclick="switchAuth(true)" class="flex-1 py-4 font-bold text-[10px] uppercase text-gold">Register</button>
            </div>
            <div class="auth-slider">
                <div class="auth-form space-y-6 pt-10">
                    <h2 class="text-3xl font-black text-gold text-center">APRIL</h2>
                    <input type="email" id="l-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <button onclick="handleAuth(true)" class="w-full classic-gold py-4 rounded-xl font-black">SIGN IN</button>
                </div>
                <div class="auth-form space-y-4 pt-10">
                    <h2 class="text-2xl font-black text-gold text-center">REGISTER</h2>
                    <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <input type="text" id="refBy" placeholder="Refer Code" class="w-full bg-white/10 p-4 rounded-xl border border-gold/30 text-yellow-500">
                    <button onclick="handleAuth(false)" class="w-full bg-white text-black py-4 rounded-xl font-black">CREATE</button>
                </div>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section pb-28">
        <header class="p-6 flex justify-between items-center sticky top-0 bg-[#050507]/90 backdrop-blur z-50">
            <h1 class="text-xl font-black italic text-gold">APRIL EARNING</h1>
            <div class="flex items-center gap-3">
                <button onclick="showNotice()" class="text-gold"><i class="fas fa-bell"></i></button>
                <div class="bg-white/5 px-4 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
                    <i class="fas fa-coins text-gold"></i>
                    <span id="balance" class="font-bold">0</span>
                </div>
            </div>
        </header>

        <section id="home-tab" class="px-6">
            <button onclick="claimDaily()" class="w-full premium-card p-4 mb-6 flex justify-between items-center border-l-4 border-gold">
                <span class="font-bold text-sm">Daily Bonus (5 Coins)</span>
                <i class="fas fa-gift text-gold"></i>
            </button>

            <div id="captcha-box-wrap" class="premium-card p-6 text-center relative overflow-hidden">
                <div id="timer-box">
                    <div class="text-center"><p class="text-4xl font-black text-gold" id="timer-sec">15</p></div>
                </div>
                <div class="bg-black/50 py-8 rounded-2xl mb-4 border border-white/5 relative">
                    <span id="captcha-code" class="text-4xl font-black tracking-[8px] opacity-20">LOAD...</span>
                    <button onclick="generateCaptcha()" class="absolute top-2 right-2 text-gray-600"><i class="fas fa-sync"></i></button>
                </div>
                <input type="text" id="user-input" placeholder="Type Code" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-center font-bold mb-4 outline-none uppercase">
                <button onclick="processCaptcha()" class="w-full classic-gold py-4 rounded-xl font-black">CLAIM 1.5 COINS</button>
            </div>
        </section>

        <section id="refer-tab" class="hidden-section px-6">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="premium-card p-4 text-center text-xs">Invites: <b id="inv-count">0</b></div>
                <div class="premium-card p-4 text-center text-xs">Comm: <b id="comm-count">0.0</b></div>
            </div>
            <div class="premium-card p-4 text-center text-[10px] mb-4 truncate border-white/10" id="share-link">...</div>
            <button onclick="copyLink()" class="w-full bg-white text-black py-3 rounded-xl font-bold mb-4">COPY LINK</button>
            <div class="premium-card p-4">
                <input type="text" id="gift-code" placeholder="Gift Code" class="w-full bg-white/5 p-3 rounded-xl mb-2 border border-white/10">
                <button onclick="redeemGift()" class="w-full classic-gold py-3 rounded-xl font-bold">REDEEM</button>
            </div>
        </section>

        <section id="wallet-tab" class="hidden-section px-6">
            <div class="premium-card p-6 space-y-4">
                <input type="text" id="upi" placeholder="UPI ID" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                <select id="w-amt" class="w-full bg-white/5 p-4 rounded-xl border border-white/10">
                    <option value="1000">1,000 Coins (₹30)</option>
                    <option value="2000">2,000 Coins (₹60)</option>
                    <option value="5000">5,000 Coins (₹150)</option>
                </option>
                </select>
                <button onclick="handleWithdraw()" class="w-full classic-gold py-4 rounded-xl font-black">WITHDRAW</button>
            </div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 p-4 flex justify-around items-center z-[10000] rounded-t-3xl">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active text-xl"><i class="fas fa-home"></i></button>
            <button onclick="showTab('refer-tab')" id="n-refer" class="text-gray-600 text-xl"><i class="fas fa-gift"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-600 text-xl"><i class="fas fa-wallet"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            authDomain: "arpi-earning.firebaseapp.com",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning",
            storageBucket: "arpi-earning.firebasestorage.app",
            messagingSenderId: "427035865345",
            appId: "1:427035865345:web:2c207e1417a49e14a22b00"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "";
        let userData = {};

        window.onload = () => {
            generateCaptcha();
            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
        };

        function switchAuth(isReg) { document.getElementById('auth-wrap').classList.toggle('show-register', isReg); }

        function handleAuth(isLogin) {
            const email = isLogin ? document.getElementById('l-email').value : document.getElementById('r-email').value;
            const pass = isLogin ? document.getElementById('l-pass').value : document.getElementById('r-pass').value;
            if(!email || !pass) return alert("Fill fields!");
            const key = email.replace(/[.#$[\]]/g, "_");
            database.ref('users/' + key).once('value', snap => {
                if(isLogin) {
                    if(snap.exists() && snap.val().password === pass) { currentUser = key; localStorage.setItem('aprilUser', key); enterApp(); }
                    else alert("Error!");
                } else {
                    if(snap.exists()) return alert("Exists!");
                    database.ref('users/' + key).set({ password: pass, balance: 55, invites: 0 });
                    currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('share-link').innerText = window.location.origin + window.location.pathname + "?ref=" + currentUser;
            syncData();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val();
                document.getElementById('balance').innerText = Math.floor(userData.balance);
            });
        }

        function generateCaptcha() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let res = "";
            for(let i=0; i<6; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        function processCaptcha() {
            const input = document.getElementById('user-input').value.toUpperCase();
            if(input === document.getElementById('captcha-code').innerText) {
                document.getElementById('captcha-box-wrap').classList.add('timer-active');
                let sec = 15;
                const t = setInterval(() => {
                    sec--; document.getElementById('timer-sec').innerText = sec;
                    if(sec <= 0) { clearInterval(t); document.getElementById('captcha-box-wrap').classList.remove('timer-active'); }
                }, 1000);
                window.open("https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e");
                database.ref('users/' + currentUser).update({ balance: userData.balance + 1.5 });
                generateCaptcha(); document.getElementById('user-input').value = "";
            } else alert("Wrong!");
        }

        function showTab(id) {
            ['home-tab', 'refer-tab', 'wallet-tab'].forEach(t => document.getElementById(t).classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('nav-active', 'text-gray-600'));
            const map = {'home-tab':'n-home', 'refer-tab':'n-refer', 'wallet-tab':'n-wallet'};
            document.getElementById(map[id]).classList.replace('text-gray-600', 'nav-active');
        }

        function handleWithdraw() {
            window.open("https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e");
            alert("Requested!");
        }
        
        function copyLink() { navigator.clipboard.writeText(document.getElementById('share-link').innerText); alert("Copied!"); }
        function claimDaily() { alert("Claimed!"); }
        function showNotice() { alert("Welcome!"); }
    </script>

    <div class="ads-container" style="display:flex; justify-content:center; margin-top:20px;">
        <script type="text/javascript">
            atOptions = { 'key' : '519ceac42444d69ac28ec1621467ee97', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://landslidegraphsystems.com/519ceac42444d69ac28ec1621467ee97/invoke.js"></script>
    </div>
    <script src="https://landslidegraphsystems.com/e8/05/8f/e8058f59b323b04bd8e64295ac0638c0.js" async></script>
</body>
                        </html>
