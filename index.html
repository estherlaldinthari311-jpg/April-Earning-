    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            authDomain: "arpi-earning.firebaseapp.com",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning",
            storageBucket: "arpi-earning.firebasestorage.app",
            messagingSenderId: "427035865345",
            appId: "1:427035865345:web:2c207e1417a49e14a22b00"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "";
        let userData = {};

        function slideAuth(mode) { 
            document.getElementById('auth-container').style.transform = mode === 'signup' ? 'translateX(-50%)' : 'translateX(0)'; 
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if(params.get('ref')) { slideAuth('signup'); document.getElementById('ref-input').value = params.get('ref'); }
            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
        };

        function handleSignup() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const ref = document.getElementById('ref-input').value.trim();
            if(!email || !pass) return alert("Fill all fields");
            const key = email.replace(/[.#$[\]]/g, "_");
            database.ref('users/' + key).once('value', snap => {
                if(snap.exists()) return alert("User already exists");
                database.ref('users/' + key).set({ password: pass, balance: 55, invites: 0, comm: 0 });
                if(ref && ref !== key) {
                    database.ref('users/' + ref).once('value', r => {
                        if(r.exists()){
                            database.ref('users/' + ref).update({ 
                                balance: (r.val().balance || 0) + 10.3, 
                                invites: (r.val().invites || 0) + 1,
                                comm: (r.val().comm || 0) + 0.3 
                            });
                        }
                    });
                }
                currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
            });
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            if(!email || !pass) return alert("Fill fields");
            const key = email.replace(/[.#$[\]]/g, "_");
            database.ref('users/' + key).once('value', snap => {
                if(snap.exists() && snap.val().password === pass) { 
                    currentUser = key; 
                    localStorage.setItem('aprilUser', key); 
                    enterApp(); 
                }
                else alert("Incorrect login info");
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('my-ref-link').value = window.location.origin + window.location.pathname + "?ref=" + currentUser;
            syncData(); generateCaptcha();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val();
                if(!userData) return;
                document.getElementById('balance').innerText = Math.floor(userData.balance || 0);
                document.getElementById('inv-count').innerText = userData.invites || 0;
                document.getElementById('comm-count').innerText = (userData.comm || 0).toFixed(1);
                
                const btn = document.getElementById('wdr-btn');
                const lock = document.getElementById('lock-msg');
                if((userData.invites || 0) >= 2) { 
                    btn.classList.remove('locked-btn'); 
                    lock.classList.add('hidden-section'); 
                }
            });
            database.ref('withdrawals').orderByChild('user').equalTo(currentUser).on('value', snap => {
                const hist = document.getElementById('wdr-history'); hist.innerHTML = "";
                snap.forEach(s => {
                    const d = s.val();
                    hist.innerHTML += `<div class="premium-card p-4 flex justify-between items-center text-[10px] mb-2">
                        <div><p class="font-bold">${d.upi}</p></div>
                        <div class="text-right text-yellow-500 font-bold">₹${d.amount/33.3}</div>
                    </div>`;
                });
            });
        }

        function processCaptcha() {
            if(document.getElementById('user-input').value.toUpperCase() === document.getElementById('captcha-code').innerText) {
                document.getElementById('captcha-box-wrap').classList.add('timer-active');
                let sec = 15;
                const t = setInterval(() => {
                    sec--; document.getElementById('timer-sec').innerText = sec;
                    if(sec <= 0) { 
                        clearInterval(t); 
                        document.getElementById('captcha-box-wrap').classList.remove('timer-active'); 
                        database.ref('users/' + currentUser).update({ balance: (userData.balance || 0) + 1.5 });
                        generateCaptcha(); 
                        document.getElementById('user-input').value = "";
                    }
                }, 1000);
                window.open("https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e", "_blank");
            } else alert("Invalid Captcha");
        }

        function redeemGift() {
            const code = document.getElementById('gift-code').value.toUpperCase();
            if(code === "APRIL55" && !userData.giftUsed) {
                database.ref('users/' + currentUser).update({ balance: (userData.balance || 0) + 55, giftUsed: true });
                alert("55 Added successfully!");
            } else alert("Code already used or invalid");
        }

        function copyRefLink() {
            const link = document.getElementById("my-ref-link");
            link.select(); navigator.clipboard.writeText(link.value);
            alert("Referral link copied!");
        }

        function shareWhatsApp() {
            window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent("Join APRIL and get 55 Bonus! " + document.getElementById('my-ref-link').value));
        }

        function handleWithdraw() {
            const upi = document.getElementById('upi').value;
            const amt = document.getElementById('w-amt').value;
            if(!upi) return alert("Please enter UPI ID");
            if(userData.balance < amt) return alert("Not enough balance");
            database.ref('withdrawals').push({ user: currentUser, upi: upi, amount: amt, status: 'Pending', date: new Date().toLocaleDateString() });
            database.ref('users/'+currentUser).update({ balance: userData.balance - amt });
            alert("Withdrawal request sent!");
        }

        function generateCaptcha() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let res = ""; for(let i=0; i<4; i++) res
