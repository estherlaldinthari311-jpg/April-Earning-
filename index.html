<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APRIL EARNING</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #fff; margin: 0; height: 100vh; overflow: hidden; }
        
        /* CLICKABLE AREA FIX */
        button, input, a, select { 
            cursor: pointer !important; 
            pointer-events: auto !important;
            position: relative;
            z-index: 100 !important;
        }

        .premium-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .classic-gold { background: #ffd700; color: #000; font-weight: 800; }
        .hidden-section { display: none !important; }
        
        /* Ad box that doesn't block content */
        .ad-top-box { width: 100%; height: 60px; background: #000; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #111; }
        
        #auth-container { width: 200%; display: flex; transition: transform 0.4s ease-in-out; }
        .auth-view { width: 50%; padding: 20px; }
    </style>
</head>
<body>

    <div class="ad-top-box">
        <script type="text/javascript">
            atOptions = { 'key' : '519ceac42444d69ac28ec1621467ee97', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://landslidegraphsystems.com/519ceac42444d69ac28ec1621467ee97/invoke.js"></script>
    </div>

    <section id="auth-page" class="flex flex-col items-center justify-center h-[80vh]">
        <div class="w-full max-w-[350px] overflow-hidden premium-card p-6">
            <h2 class="text-3xl font-black text-center text-yellow-500 italic mb-6">APRIL EARNING</h2>
            <div id="auth-container">
                <div class="auth-view space-y-4">
                    <input type="email" id="l-email" placeholder="Email" class="w-full bg-white/10 p-4 rounded-xl text-white outline-none">
                    <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/10 p-4 rounded-xl text-white outline-none">
                    <button onclick="doLogin()" class="w-full classic-gold py-4 rounded-xl uppercase">Login</button>
                    <p class="text-center text-xs">New? <span onclick="go('signup')" class="text-yellow-500 font-bold underline">Create Account</span></p>
                </div>
                <div class="auth-view space-y-4">
                    <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/10 p-4 rounded-xl text-white outline-none">
                    <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/10 p-4 rounded-xl text-white outline-none">
                    <input type="text" id="r-ref" placeholder="Referral Code (Optional)" class="w-full bg-white/10 p-4 rounded-xl text-white outline-none">
                    <button onclick="doSignup()" class="w-full classic-gold py-4 rounded-xl uppercase">Register (Bonus 55)</button>
                    <p class="text-center text-xs">Back? <span onclick="go('login')" class="text-yellow-500 font-bold underline">Login</span></p>
                </div>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section h-screen flex flex-col">
        <header class="p-5 flex justify-between items-center border-b border-white/5">
            <h1 class="text-xl font-black italic text-yellow-500">APRIL</h1>
            <div class="bg-yellow-500/10 px-4 py-2 rounded-full text-yellow-500 font-bold">
                <i class="fas fa-coins mr-1"></i> <span id="bal-ui">0</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 pb-32 space-y-6">
            <div id="tab-home" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <a href="https://t.me/+ECYBETZqIrg0OGI1" target="_blank" class="premium-card p-4 text-center">
                        <i class="fab fa-telegram text-2xl text-blue-400 mb-1"></i>
                        <p class="text-[10px] font-bold">TELEGRAM</p>
                    </a>
                    <a href="https://www.instagram.com/aprilearning_official" target="_blank" class="premium-card p-4 text-center">
                        <i class="fab fa-instagram text-2xl text-pink-500 mb-1"></i>
                        <p class="text-[10px] font-bold">INSTAGRAM</p>
                    </a>
                </div>
                <div class="premium-card p-6 text-center space-y-4">
                    <div class="bg-black/40 py-8 rounded-xl border border-white/5 text-2xl font-black tracking-widest text-white/20" id="cap-code">XXXX</div>
                    <input type="text" id="cap-input" placeholder="Enter code" class="w-full bg-white/10 p-4 rounded-xl text-center outline-none text-yellow-500 font-bold">
                    <button onclick="verifyCap()" class="w-full classic-gold py-4 rounded-xl">CLAIM 1.5</button>
                </div>
            </div>

            <div id="tab-partner" class="hidden-section space-y-4">
                <div class="premium-card p-6 text-center">
                    <p class="text-xs text-gray-500 mb-1 uppercase">Total Invites</p>
                    <h3 id="inv-ui" class="text-4xl font-black">0</h3>
                </div>
                <div class="premium-card p-6 space-y-4">
                    <p class="text-[10px] font-bold text-center text-gray-400">YOUR REFER LINK (Bonus 10)</p>
                    <input type="text" id="ref-link" readonly class="w-full bg-white/5 p-3 rounded-lg text-[10px] outline-none">
                    <button onclick="copyRef()" class="w-full bg-white/10 py-3 rounded-xl font-bold">COPY LINK</button>
                </div>
            </div>

            <div id="tab-wallet" class="hidden-section space-y-4">
                <div id="lock-msg" class="bg-red-500/20 text-red-500 p-4 rounded-xl text-center text-[10px] font-bold border border-red-500/30">
                    <i class="fas fa-lock mr-2"></i> INVITE 2 FRIENDS TO WITHDRAW
                </div>
                <div class="premium-card p-6 space-y-4">
                    <input type="text" id="upi-id" placeholder="UPI ID" class="w-full bg-white/10 p-4 rounded-xl outline-none">
                    <select id="w-amt" class="w-full bg-white/10 p-4 rounded-xl font-bold outline-none text-yellow-500">
                        <option value="1000">1,000 = ₹30</option>
                        <option value="2000">2,000 = ₹60</option>
                        <option value="5000">5,000 = ₹150</option>
                        <option value="10000">10,000 = ₹300</option>
                    </select>
                    <button id="w-btn" onclick="withdraw()" class="w-full bg-gray-700 py-4 rounded-xl font-bold opacity-30 pointer-events-none">WITHDRAW</button>
                </div>
                <div id="hist-box" class="space-y-2"></div>
            </div>
        </div>

        <nav class="fixed bottom-6 left-6 right-6 bg-zinc-900 border border-white/10 flex justify-around p-4 rounded-3xl">
            <button onclick="tab('home')" id="n-home" class="text-yellow-500 text-xl"><i class="fas fa-home"></i></button>
            <button onclick="tab('partner')" id="n-partner" class="text-gray-500 text-xl"><i class="fas fa-users"></i></button>
            <button onclick="tab('wallet')" id="n-wallet" class="text-gray-500 text-xl"><i class="fas fa-wallet"></i></button>
        </nav>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let user = "";
        let uData = {};

        function go(m) { document.getElementById('auth-container').style.transform = m==='signup'?'translateX(-50%)':'translateX(0)'; }

        window.onload = () => {
            const r = new URLSearchParams(window.location.search).get('ref');
            if(r) { go('signup'); document.getElementById('r-ref').value = r; }
            const s = localStorage.getItem('apr_user');
            if(s) { user = s; loadApp(); }
        };

        function doSignup() {
            const e = document.getElementById('r-email').value, p = document.getElementById('r-pass').value, r = document.getElementById('r-ref').value;
            if(!e || !p) return alert("Fill all!");
            const k = e.replace(/[.#$[\]]/g, "_");
            db.ref('users/'+k).once('value', s => {
                if(s.exists()) return alert("Exists!");
                db.ref('users/'+k).set({ p:p, b:55, i:0 });
                if(r && r !== k) {
                    db.ref('users/'+r).once('value', v => {
                        if(v.exists()) db.ref('users/'+r).update({ b: (v.val().b||0)+10, i: (v.val().i||0)+1 });
                    });
                }
                user = k; localStorage.setItem('apr_user', k); loadApp();
            });
        }

        function doLogin() {
            const e = document.getElementById('l-email').value, p = document.getElementById('l-pass').value;
            const k = e.replace(/[.#$[\]]/g, "_");
            db.ref('users/'+k).once('value', s => {
                if(s.exists() && s.val().p === p) { user = k; localStorage.setItem('apr_user', k); loadApp(); }
                else alert("Wrong!");
            });
        }

        function loadApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('ref-link').value = window.location.origin + window.location.pathname + "?ref=" + user;
            sync(); gen();
        }

        function sync() {
            db.ref('users/'+user).on('value', s => {
                uData = s.val(); if(!uData) return;
                document.getElementById('bal-ui').innerText = Math.floor(uData.b || 0);
                document.getElementById('inv-ui').innerText = uData.i || 0;
                if((uData.i || 0) >= 2) {
                    document.getElementById('w-btn').classList.replace('bg-gray-700', 'classic-gold');
                    document.getElementById('w-btn').classList.remove('opacity-30', 'pointer-events-none');
                    document.getElementById('lock-msg').classList.add('hidden-section');
                }
            });
        }

        function verifyCap() {
            if(document.getElementById('cap-input').value.toUpperCase() === document.getElementById('cap-code').innerText) {
                db.ref('users/'+user).update({ b: (uData.b || 0) + 1.5 });
                window.open("https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e", "_blank");
                document.getElementById('cap-input').value = ""; gen();
            } else alert("Wrong!");
        }

        function withdraw() {
            const upi = document.getElementById('upi-id').value, amt = document.getElementById('w-amt').value;
            if(!upi) return alert("Enter UPI");
            if(uData.b < amt) return alert("Low balance");
            db.ref('withdrawals').push({ u:user, upi:upi, a:amt, status:'Pending' });
            db.ref('users/'+user).update({ b: uData.b - amt });
            alert("Success!");
        }

        function gen() {
            const c = "ABC123XYZ456"; let r = "";
            for(let i=0; i<4; i++) r += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('cap-code').innerText = r;
        }

        function tab(t) {
            ['home', 'partner', 'wallet'].forEach(x => document.getElementById('tab-'+x).classList.add('hidden-section'));
            document.getElementById('tab-'+t).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-yellow-500', 'text-gray-500'));
            document.getElementById('n-'+t).classList.replace('text-gray-500', 'text-yellow-500');
        }

        function copyRef() {
            const l = document.getElementById('ref-link'); l.select();
            navigator.clipboard.writeText(l.value); alert("Copied!");
        }
    </script>
</body>
                    </html>
