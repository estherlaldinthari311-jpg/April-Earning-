        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #fff; margin: 0; overflow-x: hidden; }

        /* BUTTON CLICKABLE FIX - Layer hi a pawimawh ber */
        button, input, select, a, .tab-btn {

            z-index: 999 !important; 
            cursor: pointer !important; 
            pointer-events: auto !important;

        .premium-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(197, 160, 89, 0.1);

        /* ANTI-BLOCK TIMER */
        #timer-box { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; align-items: center; justify-content: center; 
            z-index: 1000; border-radius: 24px; 
        }
        .timer-active #timer-box { display: flex; }

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            authDomain: "arpi-earning.firebaseapp.com",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning",
            storageBucket: "arpi-earning.firebasestorage.app",
            messagingSenderId: "427035865345",
            appId: "1:427035865345:web:2c207e1417a49e14a22b00"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "";
        let userData = {};

        window.onload = () => {
            generateCaptcha();
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            if(ref) { switchAuth(true); document.getElementById('refBy').value = ref; }

            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
            loadLeaderboard();
        };

        function switchAuth(isReg) { document.getElementById('auth-wrap').classList.toggle('show-register', isReg); }

        function handleAuth(isLogin) {
            const email = isLogin ? document.getElementById('l-email').value : document.getElementById('r-email').value;
            const pass = isLogin ? document.getElementById('l-pass').value : document.getElementById('r-pass').value;
            const ref = document.getElementById('refBy').value.trim();
            if(!email || !pass) return alert("Fill all fields");

            const key = email.replace(/[.#$[\]]/g, "_");
            database.ref('users/' + key).once('value', snap => {
                if(isLogin) {
                    if(snap.exists() && snap.val().password === pass) {
                        currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                    } else alert("Invalid Login");
                } else {
                    if(snap.exists()) return alert("User exists");
                    database.ref('users/' + key).set({ 
                        password: pass, balance: 55, invites: 0, invitedBy: ref, 
                        commEarnings: 0, lastClaim: 0, tg: false, ig: false 
                    });
                    if(ref && ref !== key) {
                        database.ref('users/' + ref).once('value', s => {
                            if(s.exists()) database.ref('users/' + ref).update({ invites: (s.val().invites||0)+1, balance: (s.val().balance||0)+10 });
                        });
                    }
                    currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('share-link').innerText = window.location.origin + window.location.pathname + "?ref=" + currentUser;
            syncData();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val();
                document.getElementById('balance').innerText = Math.floor(userData.balance);
                if(userData.tg) document.getElementById('tg-btn').innerText = "DONE";
                if(userData.ig) document.getElementById('ig-btn').innerText = "DONE";
            });
            database.ref('withdrawals').orderByChild('user').equalTo(currentUser).on('value', snap => {
                const hist = document.getElementById('wdr-history'); hist.innerHTML = "";
                snap.forEach(c => {
                    hist.innerHTML += `<div class="premium-card p-3 flex justify-between items-center text-[10px]">
                        <span>${c.val().status}</span><b>₹${Math.floor(c.val().amount/33.3)}</b>
                    </div>`;
                });
            });
        }

        function generateCaptcha() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let res = "";
            for(let i=0; i<6; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        function processCaptcha() {
            const input = document.getElementById('user-input').value.toUpperCase();
            if(input === document.getElementById('captcha-code').innerText) {
                document.getElementById('captcha-box-wrap').classList.add('timer-active');
                let sec = 15;
                const t = setInterval(() => {
                    sec--; document.getElementById('timer-sec').innerText = sec;
                    if(sec <= 0) { clearInterval(t); document.getElementById('captcha-box-wrap').classList.remove('timer-active'); document.getElementById('timer-sec').innerText = "15"; }
                }, 1000);

                window.open("https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e");
                database.ref('users/' + currentUser).update({ balance: userData.balance + 1.5 });
                if(userData.invitedBy) {
                    database.ref('users/' + userData.invitedBy).once('value', s => {
                        if(s.exists()) database.ref('users/' + userData.invitedBy).update({ balance: (s.val().balance||0)+0.3 });
                    });
                }
                generateCaptcha(); document.getElementById('user-input').value = "";
            } else alert("Wrong!");
        }

        function handleWithdraw() {
            const amt = parseInt(document.getElementById('w-amt').value);
            const upi = document.getElementById('upi').value;
            const today = new Date().toLocaleDateString();
            if(!upi) return alert("Enter UPI");
            if(userData.invites < 2) return alert("Need 2 Invites");
            
            database.ref('withdrawals').orderByChild('user').equalTo(currentUser).once('value', snap => {
                let count = 0; snap.forEach(x => { if(x.val().date.includes(today)) count++; });
                if(count >= 3) return alert("Daily limit reached");
                if(userData.balance < amt) return alert("Insufficient balance");
                
                window.open("https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e");
                database.ref('users/' + currentUser).update({ balance: userData.balance - amt });
                database.ref('withdrawals').push({ user: currentUser, amount: amt, upi: upi, status: "Pending", date: new Date().toLocaleString() });
                alert("Withdrawal Requested!");
            });
        }

        function joinSocial(type) {
            if(userData[type]) return alert("Claimed!");
            const link = type === 'tg' ? 'https://t.me/+ECYBETZqIrg0OGI1' : 'https://www.instagram.com/aprilearning_official?igsh=aHQwbGp6a2I4aWQy';
            window.open(link);
            const upd = { balance: userData.balance + 20 }; upd[type] = true;
            database.ref('users/' + currentUser).update(upd);
        }

        function claimDaily() {
            const now = Date.now();
            if(now - (userData.lastClaim||0) < 86400000) return alert("Wait 24h");
            database.ref('users/' + currentUser).update({ balance: userData.balance + 5, lastClaim: now });
            alert("5 Coins Claimed!");
        }

        function loadLeaderboard() {
            database.ref('users').orderByChild('balance').limitToLast(3).on('value', snap => {
                const lb = document.getElementById('leaderboard'); lb.innerHTML = "";
                let p = []; snap.forEach(s => p.push({n: s.key.split('_')[0], b: s.val().balance}));
                p.reverse().forEach((x, i) => {
                    lb.innerHTML += `<div class="premium-card p-3 flex justify-between bg-white/5 border-none text-[11px]">
                        <span>${i+1}. ${x.n}</span><b>${Math.floor(x.b)} Coins</b>
                    </div>`;
                });
            });
        }

        function showTab(id) {
            ['home-tab', 'refer-tab', 'wallet-tab'].forEach(t => document.getElementById(t).classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('nav-active', 'text-gray-600'));
            const map = {'home-tab':'n-home', 'refer-tab':'n-refer', 'wallet-tab':'n-wallet'};
            document.getElementById(map[id]).classList.replace('text-gray-600', 'nav-active');
        }

        function copyLink() { navigator.clipboard.writeText(document.getElementById('share-link').innerText); alert("Copied!"); }
        function shareWA() { window.open("https://wa.me/?text=" + encodeURIComponent("Join April Earning: " + document.getElementById('share-link').innerText)); }
        function showNotice() { database.ref('app_settings/notice').once('v
