<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>April Premium - Final</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #fff; margin: 0; height: 100vh; overflow: hidden; }
        .april-gradient { background: linear-gradient(135deg, #ff0055, #ff8000); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; }
        .hidden-section { display: none !important; }
        #main-app { height: 100vh; display: flex; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .nav-active { color: #ff0055; transform: scale(1.1); text-shadow: 0 0 10px rgba(255, 0, 85, 0.3); }
        
        .auth-container { width: 100%; max-width: 400px; height: 560px; overflow: hidden; position: relative; z-index: 10; }
        .auth-slider { display: flex; width: 200%; transition: 0.5s ease-in-out; }
        .auth-form { width: 50%; padding: 25px; }
        .show-register .auth-slider { transform: translateX(-50%); }
    </style>
</head>
<body>

    <section id="auth-page" class="h-screen flex items-center justify-center p-6">
        <div id="auth-wrap" class="glass auth-container shadow-2xl">
            <div class="flex border-b border-white/5 text-[10px] font-black uppercase tracking-widest">
                <button onclick="switchAuth(false)" class="flex-1 py-5">Login</button>
                <button onclick="switchAuth(true)" class="flex-1 py-5 text-pink-500">Register</button>
            </div>
            <div class="auth-slider">
                <div class="auth-form space-y-5">
                    <h2 class="text-3xl font-black mt-4 italic">WELCOME</h2>
                    <input type="email" id="l-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <button onclick="handleAuth(true)" class="w-full april-gradient py-4 rounded-2xl font-black">LOGIN</button>
                </div>
                <div class="auth-form space-y-5">
                    <h2 class="text-3xl font-black mt-4 text-pink-500 italic">JOIN PRO</h2>
                    <p class="text-[9px] text-gray-400 font-bold">BONUS: 55 COINS</p>
                    <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <input type="text" id="refBy" placeholder="Referral Code (Auto)" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-pink-500/20">
                    <button onclick="handleAuth(false)" class="w-full bg-white text-black py-4 rounded-2xl font-black">REGISTER</button>
                </div>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section">
        
        <div class="w-full flex justify-center bg-black/50 py-2 border-b border-white/5" style="min-height: 60px;">
            <script type="text/javascript">
                atOptions = { 'key' : '519ceac42444d69ac28ec1621467ee97', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/519ceac42444d69ac28ec1621467ee97/invoke.js"></script>
        </div>

        <header class="p-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="showNotice()" class="w-10 h-10 glass flex items-center justify-center text-yellow-500"><i class="fas fa-bell"></i></button>
                <h1 class="text-xl font-black italic uppercase">April<span class="text-pink-500">Coins</span></h1>
            </div>
            <div class="bg-white/5 px-4 py-2 rounded-full border border-white/10 flex items-center gap-2">
                <i class="fas fa-coins text-yellow-500 text-sm"></i>
                <span id="balance" class="font-black">0</span>
            </div>
        </header>

        <div class="content-area">
            <section id="home-tab" class="px-6 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <a href="https://t.me/+ECYBETZqIrg0OGI1" target="_blank" class="glass p-3 flex items-center justify-center gap-2">
                        <i class="fab fa-telegram text-blue-400 text-lg"></i>
                        <span class="text-[10px] font-black uppercase">Telegram</span>
                    </a>
                    <a href="https://www.instagram.com/aprilearning_official?igsh=aHQwbGp6a2I4aWQy" target="_blank" class="glass p-3 flex items-center justify-center gap-2">
                        <i class="fab fa-instagram text-pink-500 text-lg"></i>
                        <span class="text-[10px] font-black uppercase">Instagram</span>
                    </a>
                </div>

                <button onclick="claimDaily()" class="w-full glass p-5 flex justify-between items-center border-l-4 border-yellow-500">
                    <div class="text-left"><p class="font-black text-sm uppercase">Daily Reward</p><p class="text-[9px] text-gray-500">+5 Coins Free</p></div>
                    <i class="fas fa-gift text-yellow-500 text-xl"></i>
                </button>

                <div class="glass p-6 text-center">
                    <p class="text-[9px] font-black text-gray-500 uppercase mb-4 tracking-widest">Captcha Task</p>
                    <div class="bg-white/5 p-6 rounded-3xl border border-white/5 mb-4 relative">
                        <span id="captcha-code" class="text-3xl font-mono font-black tracking-[10px] opacity-40">LOAD</span>
                        <button onclick="generateCaptcha()" class="absolute right-4 top-4 text-gray-600"><i class="fas fa-sync"></i></button>
                    </div>
                    <input type="text" id="user-input" placeholder="Type here..." class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-center font-bold mb-4 outline-none uppercase">
                    <button onclick="processCaptcha()" class="w-full april-gradient py-4 rounded-2xl font-black uppercase text-sm shadow-lg">Claim 1.5 Coins</button>
                </div>
            </section>

            <section id="refer-tab" class="hidden-section px-6 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-5 text-center"><p class="text-[9px] text-gray-500 uppercase">Invites</p><p id="inv-count" class="text-xl font-black">0</p></div>
                    <div class="glass p-5 text-center"><p class="text-[9px] text-gray-500 uppercase">Commission</p><p id="ref-income" class="text-xl font-black text-green-500">0.0</p></div>
                </div>

                <div class="glass p-8 text-center border-t-2 border-pink-500">
                    <h3 class="font-black uppercase text-sm mb-2">Invite Friends</h3>
                    <p class="text-[10px] text-gray-400 mb-6 uppercase tracking-widest">+10 Bonus | +0.3 Comm.</p>
                    <div class="bg-black/50 p-4 rounded-xl mb-4 border border-white/5 truncate text-[9px] font-mono text-pink-400" id="share-link">Generating Link...</div>
                    <button onclick="copyLink()" class="w-full april-gradient py-4 rounded-2xl font-black text-xs uppercase"><i class="fas fa-copy mr-2"></i> Copy Invite Link</button>
                </div>

                <div class="glass p-5">
                    <p class="text-[9px] font-black text-gray-500 mb-3 uppercase">Have a Gift Code?</p>
                    <div class="flex gap-2">
                        <input type="text" id="gift-input" placeholder="ENTER CODE" class="flex-1 bg-white/5 border border-white/10 p-3 rounded-xl outline-none font-bold text-pink-500 text-xs uppercase">
                        <button onclick="claimGift()" class="april-gradient px-5 rounded-xl text-[10px] font-black uppercase">Apply</button>
                    </div>
                </div>
            </section>

            <section id="leader-tab" class="hidden-section px-6 pb-10">
                <h2 class="text-center font-black uppercase italic text-pink-500 py-6">Leaderboard</h2>
                <div id="leader-list" class="space-y-2"></div>
            </section>

            <section id="wallet-tab" class="hidden-section px-6 space-y-6">
                <div id="w-lock-msg" class="glass p-4 border-l-4 border-red-500 text-[10px] font-black text-red-400">
                    <i class="fas fa-lock mr-2"></i> 2 INVITES NEEDED TO UNLOCK
                </div>
                <div class="glass p-8 space-y-4">
                    <input type="text" id="upi" placeholder="UPI ID (e.g. name@apl)" class="w-full bg-white/5 p-4 rounded-xl outline-none border border-white/10 font-bold">
                    <select id="w-amt" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 font-bold">
                        <option value="1000">1000 Coins (₹30)</option>
                        <option value="5000">5000 Coins (₹150)</option>
                    </select>
                    <button id="w-btn" onclick="handleWithdraw()" class="w-full bg-zinc-800 text-gray-600 py-4 rounded-xl font-black uppercase pointer-events-none opacity-50">Withdraw</button>
                </div>
                <div id="wdr-history" class="space-y-2"></div>
            </section>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 p-5 flex justify-around items-center z-50 rounded-t-[35px]">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active"><i class="fas fa-home text-lg"></i></button>
            <button onclick="showTab('refer-tab')" id="n-refer" class="text-gray-600"><i class="fas fa-users text-lg"></i></button>
            <button onclick="showTab('leader-tab')" id="n-leader" class="text-gray-600"><i class="fas fa-crown text-lg"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-600"><i class="fas fa-wallet text-lg"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "", userData = {};

        window.onload = () => {
            generateCaptcha();
            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('ref')) { switchAuth(true); document.getElementById('refBy').value = urlParams.get('ref'); }
        };

        function switchAuth(isReg) { document.getElementById('auth-wrap').classList.toggle('show-register', isReg); }

        function handleAuth(isLogin) {
            const email = isLogin ? document.getElementById('l-email').value : document.getElementById('r-email').value;
            const pass = isLogin ? document.getElementById('l-pass').value : document.getElementById('r-pass').value;
            const ref = document.getElementById('refBy').value.trim();
            if(!email || !pass) return alert("Please fill all fields!");
            const key = email.replace(/[.#$[\]]/g, "_");

            database.ref('users/' + key).once('value', snap => {
                if(isLogin) {
                    if(snap.exists() && snap.val().password === pass) {
                        currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                    } else alert("Wrong email or password!");
                } else {
                    if(snap.exists()) return alert("User already exists!");
                    database.ref('users/' + key).set({ password: pass, balance: 55, invites: 0, commission: 0, invitedBy: ref, lastDaily: 0, giftUsed: false });
                    if(ref && ref !== key) {
                        database.ref('users/' + ref).once('value', s => {
                            if(s.exists()) database.ref('users/' + ref).update({ invites: (s.val().invites||0)+1, balance: (s.val().balance||0)+10 });
                        });
                    }
                    currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('share-link').innerText = window.location.origin + window.location.pathname + "?ref=" + currentUser;
            syncData();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val(); if(!userData) return;
                document.getElementById('balance').innerText = Math.floor(userData.balance || 0);
                document.getElementById('inv-count').innerText = userData.invites || 0;
                document.getElementById('ref-income').innerText = (userData.commission || 0).toFixed(1);
                if((userData.invites || 0) >= 2) {
                    document.getElementById('w-btn').className = "w-full april-gradient py-4 rounded-xl font-black uppercase text-sm shadow-lg";
                    document.getElementById('w-lock-msg').classList.add('hidden-section');
                }
            });
            database.ref('withdrawals').orderByChild('user').equalTo(currentUser).on('value', snap => {
                const hist = document.getElementById('wdr-history'); hist.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    hist.innerHTML += `<div class="glass p-4 flex justify-between items-center text-[10px] border-l-2 border-pink-500">
                        <div><p class="font-black">${d.status}</p><p class="text-gray-500">${d.date}</p></div>
                        <p class="font-black text-pink-500">₹${(d.amount/33.3).toFixed(0)}</p>
                    </div>`;
                });
            });
        }

        function generateCaptcha() {
            const c = "123456789ABCDEF"; let res = "";
            for(let i=0; i<4; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        function processCaptcha() {
            if(document.getElementById('user-input').value.toUpperCase() === document.getElementById('captcha-code').innerText) {
                database.ref('users/' + currentUser).update({ balance: (userData.balance || 0) + 1.5 });
                if(userData.invitedBy) {
                    database.ref('users/' + userData.invitedBy).once('value', s => {
                        if(s.exists()) database.ref('users/' + userData.invitedBy).update({ balance: (s.val().balance||0)+0.3, commission: (s.val().commission||0)+0.3 });
                    });
                }
                generateCaptcha(); document.getElementById('user-input').value = "";
                alert("1.5 Coins Added!");
            } else alert("Wrong Captcha!");
        }

        function claimGift() {
            const code = document.getElementById('gift-input').value.toUpperCase().trim();
            if (!code) return alert("Enter code!");
            database.ref('settings/gift_codes/' + code).once('value', snap => {
                const gift = snap.val();
                if (snap.exists() && gift.active) {
                    if (gift.used_by && gift.used_by[currentUser]) return alert("I hmang tawh!");
                    database.ref('users/' + currentUser).update({ balance: (userData.balance||0) + gift.value });
                    database.ref('settings/gift_codes/' + code + '/used_by/' + currentUser).set(true);
                    alert("Gift Claimed!");
                } else alert("Invalid Code!");
            });
        }

        function handleWithdraw() {
            const upi = document.getElementById('upi').value;
            const amt = parseInt(document.getElementById('w-amt').value);
            if(!upi) return alert("Enter UPI ID");
            if(userData.balance < amt) return alert("Insufficient Balance");
            database.ref('withdrawals').push({ user: currentUser, upi: upi, amount: amt, status: "Pending", date: new Date().toLocaleDateString() });
            database.ref('users/' + currentUser).update({ balance: userData.balance - amt });
            alert("Withdrawal Requested!");
        }

        function loadLeaderboard() {
            database.ref('users').orderByChild('balance').limitToLast(10).once('value', snap => {
                const list = document.getElementById('leader-list'); list.innerHTML = "";
                let arr = []; snap.forEach(c => arr.push({id: c.key, ...c.val()}));
                arr.reverse().forEach((u, i) => {
                    list.innerHTML += `<div class="glass p-4 flex justify-between items-center ${u.id===currentUser?'border-pink-500 bg-pink-500/10':''}">
                        <div class="flex items-center gap-3"><span class="font-black text-pink-500">#${i+1}</span><p class="text-[11px] font-bold">${u.id.replace(/_/g,'.')}</p></div>
                        <p class="font-black text-yellow-500">${Math.floor(u.balance)}</p>
                    </div>`;
                });
            });
        }

        function showTab(id) {
            ['home-tab', 'refer-tab', 'wallet-tab', 'leader-tab'].forEach(t => document.getElementById(t).classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('nav-active', 'text-gray-600'));
            const map = {'home-tab':'n-home','refer-tab':'n-refer','wallet-tab':'n-wallet','leader-tab':'n-leader'};
            document.getElementById(map[id]).classList.replace('text-gray-600', 'nav-active');
            if(id === 'leader-tab') loadLeaderboard();
        }

        function claimDaily() {
            const now = Date.now();
            if(now - (userData.lastDaily || 0) < 86400000) return alert("Wait 24h");
            database.ref('users/' + currentUser).update({ balance: (userData.balance||0)+5, lastDaily: now });
            alert("5 Coins Added!");
        }

        function showNotice() { database.ref('settings/notice').once('value', s => alert(s.val() || "Welcome!")); }
        function copyLink() { navigator.clipboard.writeText(document.getElementById('share-link').innerText); alert("Referral Link Copied!"); }
    </script>
</body>
                    </html>
