<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APRIL EARNING</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #050507; 
            color: #fff; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* I BUTTON HMEH THEIH LOHNA FIX BER */
        button, input, select, a { 
            position: relative !important; 
            z-index: 9999 !important; 
            pointer-events: auto !important; 
            cursor: pointer !important;
            touch-action: manipulation;
        }

        section, main { position: relative; z-index: 10; }

        .premium-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(197, 160, 89, 0.1); 
            backdrop-filter: blur(10px); 
            border-radius: 20px; 
        }

        .classic-gold { background: linear-gradient(135deg, #c5a059, #8e6d2f); color: #000; }
        .hidden-section { display: none !important; }
        .nav-active { color: #c5a059; transform: scale(1.1); }

        /* AUTH SLIDER */
        .auth-container { width: 100%; max-width: 400px; overflow: hidden; }
        .auth-slider { display: flex; width: 200%; transition: 0.3s ease; }
        .auth-form { width: 50%; padding: 20px; }
        .show-register .auth-slider { transform: translateX(-50%); }

        /* ANTI-BLOCK TIMER */
        #timer-box { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; align-items: center; justify-content: center; 
            z-index: 10000; border-radius: 20px; 
        }
        .timer-active #timer-box { display: flex; }
    </style>
</head>
<body>

    <section id="auth-page" class="min-h-screen flex items-center justify-center p-4">
        <div id="auth-wrap" class="premium-card auth-container shadow-2xl">
            <div class="flex bg-white/5 border-b border-white/10">
                <button type="button" onclick="switchAuth(false)" class="flex-1 py-4 font-bold text-[10px] uppercase">Login</button>
                <button type="button" onclick="switchAuth(true)" class="flex-1 py-4 font-bold text-[10px] uppercase text-gold">Register</button>
            </div>
            <div class="auth-slider">
                <div class="auth-form space-y-6 pt-6">
                    <div class="text-center">
                        <h2 class="text-3xl font-black text-[#c5a059]">APRIL EARNING</h2>
                        <p class="text-[9px] text-gray-500 uppercase">Sign in to start earning</p>
                    </div>
                    <input type="email" id="l-email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <button type="button" onclick="handleAuth(true)" class="w-full classic-gold py-4 rounded-xl font-black">SIGN IN</button>
                </div>
                <div class="auth-form space-y-4 pt-6">
                    <div class="text-center">
                        <h2 class="text-2xl font-black text-[#c5a059]">APRIL EARNING</h2>
                        <p class="text-[9px] text-green-500">Signup Bonus: 55 Coins</p>
                    </div>
                    <input type="email" id="r-email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <input type="text" id="refBy" placeholder="Referral Code" class="w-full bg-white/10 p-4 rounded-xl border border-gold/30 text-yellow-500">
                    <button type="button" onclick="handleAuth(false)" class="w-full bg-white text-black py-4 rounded-xl font-black">REGISTER</button>
                </div>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section pb-24">
        <header class="p-6 flex justify-between items-center">
            <h1 class="text-xl font-black italic text-gold">APRIL EARNING</h1>
            <div class="flex items-center gap-3">
                <button onclick="showNotice()" class="text-gold"><i class="fas fa-bell"></i></button>
                <div class="bg-white/5 px-4 py-1 rounded-full border border-white/10 flex items-center gap-2">
                    <i class="fas fa-coins text-gold"></i>
                    <span id="balance" class="font-bold">0</span>
                </div>
            </div>
        </header>

        <section id="home-tab" class="px-6">
            <button onclick="claimDaily()" class="w-full premium-card p-4 mb-6 flex justify-between items-center border-l-4 border-gold">
                <span class="font-bold text-sm">Daily Bonus (5 Coins)</span>
                <i class="fas fa-gift text-gold"></i>
            </button>

            <div id="captcha-box-wrap" class="premium-card p-6 text-center relative overflow-hidden">
                <div id="timer-box">
                    <div class="text-center">
                        <p class="text-4xl font-black text-gold mb-1" id="timer-sec">15</p>
                        <p class="text-[9px] uppercase">Syncing Ads...</p>
                    </div>
                </div>
                <div class="bg-black/50 py-8 rounded-2xl mb-4 border border-white/5 relative">
                    <span id="captcha-code" class="text-4xl font-black tracking-[10px] opacity-30">LOAD...</span>
                    <button onclick="generateCaptcha()" class="absolute top-2 right-2 text-gray-600"><i class="fas fa-sync"></i></button>
                </div>
                <input type="text" id="user-input" placeholder="Enter Code" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-center font-bold mb-4 outline-none">
                <button onclick="processCaptcha()" class="w-full classic-gold py-4 rounded-xl font-black">CLAIM 1.5 COINS</button>
            </div>

            <div class="mt-6 space-y-3">
                <button onclick="joinSocial('tg')" class="w-full premium-card p-4 flex justify-between items-center border-l-4 border-sky-500">
                    <span class="text-xs font-bold">Join Telegram</span>
                    <span id="tg-btn" class="bg-sky-600 px-3 py-1 rounded-lg text-[10px] font-bold">CLAIM 20</span>
                </button>
                <button onclick="joinSocial('ig')" class="w-full premium-card p-4 flex justify-between items-center border-l-4 border-pink-500">
                    <span class="text-xs font-bold">Follow Instagram</span>
                    <span id="ig-btn" class="bg-pink-600 px-3 py-1 rounded-lg text-[10px] font-bold">CLAIM 20</span>
                </button>
            </div>

            <div class="my-6 flex justify-center">
                <div id="container-519ceac42444d69ac28ec1621467ee97"></div>
            </div>

            <div class="mt-6">
                <p class="text-[10px] font-black text-gray-500 uppercase mb-3 text-center">Leaderboard</p>
                <div id="leaderboard" class="space-y-2"></div>
            </div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#050507] border-t border-white/10 p-4 flex justify-around items-center z-[99999]">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active text-xl"><i class="fas fa-home"></i></button>
            <button onclick="showTab('refer-tab')" id="n-refer" class="text-gray-600 text-xl"><i class="fas fa-users"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-600 text-xl"><i class="fas fa-wallet"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            authDomain: "arpi-earning.firebaseapp.com",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning",
            storageBucket: "arpi-earning.firebasestorage.app",
            messagingSenderId: "427035865345",
            appId: "1:427035865345:web:2c207e1417a49e14a22b00"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "";
        let userData = {};

        window.onload = () => {
            generateCaptcha();
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            if(ref) { switchAuth(true); document.getElementById('refBy').value = ref; }

            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
            loadLeaderboard();
        };

        function switchAuth(isReg) { document.getElementById('auth-wrap').classList.toggle('show-register', isReg); }

        function handleAuth(isLogin) {
            const email = isLogin ? document.getElementById('l-email').value : document.getElementById('r-email').value;
            const pass = isLogin ? document.getElementById('l-pass').value : document.getElementById('r-pass').value;
            const ref = document.getElementById('refBy').value.trim();
            if(!email || !pass) return alert("Fill fields!");

            const key = email.replace(/[.#$[\]]/g, "_");
            database.ref('users/' + key).once('value', snap => {
                if(isLogin) {
                    if(snap.exists() && snap.val().password === pass) {
                        currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                    } else alert("Error Login!");
                } else {
                    if(snap.exists()) return alert("Exists!");
                    database.ref('users/' + key).set({ password: pass, balance: 55, invites: 0, invitedBy: ref, lastClaim: 0, tg: false, ig: false });
                    if(ref && ref !== key) {
                        database.ref('users/' + ref).once('value', s => {
                            if(s.exists()) database.ref('users/' + ref).update({ invites: (s.val().invites||0)+1, balance: (s.val().balance||0)+10 });
                        });
                    }
                    currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            syncData();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val();
                document.getElementById('balance').innerText = Math.floor(userData.balance);
            });
        }

        function generateCaptcha() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let res = "";
            for(let i=0; i<6; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        function processCaptcha() {
            const input = document.getElementById('user-input').value.toUpperCase();
            if(input === document.getElementById('captcha-code').innerText) {
                document.getElementById('captcha-box-wrap').classList.add('timer-active');
                let sec = 15;
                const t = setInterval(() => {
                    sec--; document.getElementById('timer-sec').innerText = sec;
                    if(sec <= 0) { clearInterval(t); document.getElementById('captcha-box-wrap').classList.remove('timer-active'); }
                }, 1000);

                window.open("https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e");
                database.ref('users/' + currentUser).update({ balance: userData.balance + 1.5 });
                generateCaptcha(); document.getElementById('user-input').value = "";
            } else alert("Wrong!");
        }

        function showTab(id) {
            alert("Switching to: " + id);
        }

        function loadLeaderboard() {
            database.ref('users').orderByChild('balance').limitToLast(3).on('value', snap => {
                const lb = document.getElementById('leaderboard'); lb.innerHTML = "";
                snap.forEach(s => {
                    lb.innerHTML += `<div class="premium-card p-3 flex justify-between bg-white/5 border-none text-[11px]">
                        <span>${s.key.split('_')[0]}</span><b>${Math.floor(s.val().balance)}</b>
                    </div>`;
                });
            });
        }
    </script>

    <script src="https://landslidegraphsystems.com/e8/05/8f/e8058f59b323b04bd8e64295ac0638c0.js" async></script>
    <script src="https://landslidegraphsystems.com/d9/07/49/d90749994ae7e79af413fd864fdead46.js" async></script>
</body>
                                                                                                                                 </html>
