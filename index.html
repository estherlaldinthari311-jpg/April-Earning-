<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>April - Premium Max Earning</title>
    
    <script src="https://pl28844683.effectivegatecpm.com/d9/07/49/d90749994ae7e79af413fd864fdead46.js"></script>
    <script async="async" data-cfasync="false" src="https://pl28844431.effectivegatecpm.com/a37aaa93ed45ea8b66f8fb60e58eb230/invoke.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #08080a; color: #fff; margin: 0; overflow-x: hidden; }
        .april-gradient { background: linear-gradient(135deg, #ff0055, #ff8000); }
        .glass { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; }
        .hidden-section { display: none; }
        .nav-active { color: #ff0055; transform: scale(1.1); transition: 0.3s; }
    </style>
</head>
<body>

    <section id="auth-page" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm shadow-2xl border-t-2 border-pink-500/20 text-center">
            <h1 id="auth-title" class="text-4xl font-black mb-6 uppercase">Login</h1>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white focus:border-pink-500">
                <input type="password" id="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white focus:border-pink-500">
                <div id="ref-field" class="hidden text-left">
                   <p class="text-[9px] text-pink-500 mb-1 font-bold uppercase ml-2">Invited By</p>
                   <input type="text" id="refBy" readonly class="w-full bg-white/10 border border-white/10 p-4 rounded-2xl outline-none text-gray-400">
                </div>
                <button onclick="handleAuth()" id="auth-btn" class="w-full april-gradient py-4 rounded-2xl font-bold text-lg">LOGIN</button>
                <button onclick="toggleAuthMode()" id="auth-toggle-btn" class="w-full text-[10px] text-pink-500 font-black uppercase mt-4">Create New Account</button>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section min-h-screen pb-32">
        <section id="home-tab" class="p-6">
            <div class="flex justify-between items-center py-4 mb-4">
                <div><p class="text-[10px] font-bold text-gray-500 uppercase">Premium Member</p><h3 id="user-display" class="text-2xl font-black text-white">User</h3></div>
                <button onclick="showNotice()" class="text-yellow-500 text-xl"><i class="fas fa-bell"></i></button>
            </div>

            <div class="glass p-6 mb-6 april-gradient shadow-xl">
                <p class="text-white/70 text-[10px] font-bold uppercase mb-1">Total Balance</p>
                <h2 class="text-4xl font-black text-white">₹<span id="balance">0.00</span></h2>
            </div>

            <div class="glass p-6 border-l-4 border-yellow-500 bg-yellow-500/5 mb-6 rounded-2xl">
                <div class="text-center mb-6">
                    <h2 class="text-xs font-black uppercase text-yellow-500">Captcha Mining</h2>
                    <p class="text-[10px] text-slate-400">Earn ₹0.20 + 0.03 Commission</p>
                </div>
                <div class="relative bg-black p-6 rounded-xl border border-white/5 flex justify-center items-center mb-6">
                    <span id="captcha-code" class="text-4xl font-mono font-black tracking-[10px] text-white italic">LOAD...</span>
                    <button onclick="generateCaptcha()" class="absolute right-4 text-slate-500"><i class="fas fa-sync-alt"></i></button>
                </div>
                <input type="text" id="user-input" placeholder="Enter Code" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl text-center font-bold mb-4 uppercase text-white outline-none">
                <button id="verify-btn" onclick="processCaptcha()" class="w-full bg-gradient-to-r from-yellow-600 to-orange-600 py-4 rounded-xl font-black text-xs uppercase shadow-lg shadow-yellow-600/20 active:scale-95 transition-all">Verify & Claim</button>
            </div>

            <div class="glass p-4 mb-6 border-dashed border-2 border-pink-500/30">
                <p class="text-[10px] font-black text-gray-500 uppercase mb-2">Invite ₹3.00 + ₹0.03 Commission</p>
                <div class="flex flex-col gap-2">
                    <div class="flex gap-2">
                        <input type="text" id="share-link" readonly class="bg-white/5 p-2 rounded-lg text-[9px] flex-1 border border-white/10 outline-none">
                        <button onclick="copyLink()" class="bg-pink-600 px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Copy</button>
                    </div>
                    <button onclick="shareWhatsApp()" class="w-full bg-green-600 py-3 rounded-xl font-black text-[10px] uppercase flex items-center justify-center gap-2">
                        <i class="fab fa-whatsapp text-lg"></i> Share on WhatsApp
                    </button>
                </div>
                <div class="flex justify-around mt-4">
                    <div class="text-center"><p class="text-[9px] text-gray-500 uppercase">Invites</p><p id="inv-count" class="font-black text-pink-500">0</p></div>
                    <div class="text-center"><p class="text-[9px] text-gray-500 uppercase">Refer Income</p><p id="ref-income" class="font-black text-green-500">₹0</p></div>
                </div>
            </div>
        </section>

        <section id="wallet-tab" class="hidden-section p-6 pt-12">
            <h2 class="text-3xl font-black mb-4">Withdraw</h2>
            <div class="glass p-4 mb-6 border-l-4 border-pink-500 text-[11px] uppercase text-gray-400 bg-white/5">
                <p>• Min: ₹80 | Max: ₹200</p>
                <p>• Daily Limit: 2 times</p>
                <p>• Need 5 Invites to unlock</p>
            </div>
            <div class="glass p-6 mb-6 space-y-4">
                <input type="text" id="upi" placeholder="UPI ID" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
                <input type="number" id="w-amt" placeholder="Amount" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
                <button onclick="handleWithdraw()" class="w-full april-gradient py-4 rounded-2xl font-black uppercase">Withdraw Now</button>
            </div>
            <div id="history-list" class="space-y-2"></div>
        </section>

        <section id="spin-tab" class="hidden-section p-6 text-center">
             <h2 class="text-3xl font-black mb-10 mt-12 uppercase">Lucky Spin</h2>
             <button onclick="startSpin()" id="spin-btn" class="april-gradient w-48 h-48 rounded-full border-8 border-white/10 font-black text-2xl shadow-2xl">SPIN</button>
             <p class="mt-6 text-xs text-pink-500 uppercase font-bold">Need 10 Invites</p>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-3xl border-t border-white/5 p-4 flex justify-around items-center z-50 rounded-t-[30px]">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active"><i class="fas fa-home text-2xl"></i></button>
            <button onclick="showTab('spin-tab')" id="n-spin" class="text-gray-600"><i class="fas fa-sync-alt text-2xl"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-600"><i class="fas fa-wallet text-2xl"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            authDomain: "arpi-earning.firebaseapp.com",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning",
            storageBucket: "arpi-earning.firebasestorage.app",
            messagingSenderId: "427035865345",
            appId: "1:427035865345:web:2c207e1417a49e14a22b00"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUserEmail = "";
        let userData = { balance: 0, invites: 0, invitedBy: "" };
        let isLoginMode = true;

        window.onload = () => {
            generateCaptcha();
            const saved = localStorage.getItem('aprilUserKey');
            if(saved) { currentUserEmail = saved; enterApp(); }
            const params = new URLSearchParams(window.location.search);
            if(params.get('ref')) {
                isLoginMode = false; toggleAuthMode();
                document.getElementById('refBy').value = params.get('ref');
            }
        };

        function generateCaptcha() {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let res = "";
            for (let i = 0; i < 5; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('captcha-code').innerText = res;
        }

        function showNotice() {
            database.ref('app_settings/notice').once('value', snap => {
                alert(snap.val() || "Welcome to April Earning!");
            });
        }

        async function processCaptcha() {
            const input = document.getElementById('user-input').value.toUpperCase();
            const code = document.getElementById('captcha-code').innerText;
            const btn = document.getElementById('verify-btn');
            
            if (input === code) {
                const directLink = "https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e";
                window.open(directLink, '_blank');
                btn.disabled = true;
                let wait = 5;
                const t = setInterval(async () => {
                    btn.innerHTML = `Verifying... ${--wait}s`;
                    if (wait <= 0) {
                        clearInterval(t);
                        // Earn ₹0.20
                        await database.ref('users/' + currentUserEmail).update({ balance: (userData.balance || 0) + 0.20 });
                        
                        // Referral Commission (₹0.03)
                        if(userData.invitedBy) {
                            database.ref('users/' + userData.invitedBy).once('value', s => {
                                if(s.exists()) {
                                    database.ref('users/' + userData.invitedBy).update({ 
                                        balance: (s.val().balance || 0) + 0.03 
                                    });
                                }
                            });
                        }
                        
                        generateCaptcha(); document.getElementById('user-input').value = "";
                        btn.disabled = false; btn.innerHTML = "Verify & Claim";
                    }
                }, 1000);
            } else { alert("Captcha wrong!"); generateCaptcha(); }
        }

        function handleWithdraw() {
            const amt = parseFloat(document.getElementById('w-amt').value);
            const upi = document.getElementById('upi').value.trim();
            const today = new Date().toLocaleDateString();
            
            if (!upi) return alert("UPI ID chhu rawh!");
            if ((userData.invites || 0) < 5) return alert("Referral 5 i neih phawt a ngai!");
            
            database.ref('withdrawals').orderByChild('user').equalTo(currentUserEmail).once('value', snap => {
                let countToday = 0;
                snap.forEach(c => { if(c.val().date.includes(today)) countToday++; });
                
                if (countToday >= 2) return alert("Ni khat-ah vawi 2 chiah withdraw theih a ni!");
                if (amt < 80 || amt > 200) return alert("Amount ₹80 to ₹200 chiah!");
                if (amt > userData.balance) return alert("Balance a tawk lo!");
                
                database.ref('users/' + currentUserEmail).update({ balance: userData.balance - amt });
                database.ref('withdrawals').push({ 
                    user: currentUserEmail, 
                    amount: amt, 
                    upi: upi, 
                    status: "Pending", 
                    date: new Date().toLocaleString() 
                });
                alert("Withdraw Request Sent!");
            });
        }

        // AUTH & TAB SYSTEM
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Register";
            document.getElementById('auth-btn').innerText = isLoginMode ? "LOGIN" : "REGISTER";
            document.getElementById('ref-field').classList.toggle('hidden', isLoginMode);
        }

        function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const refBy = document.getElementById('refBy').value.trim();
            if (!email || !pass) return alert("Fill all fields!");
            
            const userKey = email.replace(/[.#$[\]]/g, "_");
            const userRef = database.ref('users/' + userKey);

            userRef.once('value').then(snap => {
                if(isLoginMode) {
                    if(snap.exists() && snap.val().password === pass) {
                        currentUserEmail = userKey; localStorage.setItem('aprilUserKey', userKey); enterApp();
                    } else alert("Details dik lo!");
                } else {
                    if(snap.exists()) return alert("User exists already!");
                    userRef.set({ password: pass, balance: 0, invites: 0, invitedBy: refBy });
                    if(refBy && refBy !== userKey) {
                        database.ref('users/' + refBy).once('value', s => {
                            if(s.exists()) database.ref('users/' + refBy).update({ invites: (s.val().invites||0)+1, balance: (s.val().balance||0)+3 });
                        });
                    }
                    currentUserEmail = userKey; localStorage.setItem('aprilUserKey', userKey); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('user-display').innerText = currentUserEmail.split('_')[0];
            document.getElementById('share-link').value = window.location.origin + window.location.pathname + "?ref=" + currentUserEmail;
            syncData();
        }

        function syncData() {
            database.ref('users/' + currentUserEmail).on('value', snap => {
                if(snap.exists()) {
                    userData = snap.val();
                    document.getElementById('balance').innerText = (userData.balance || 0).toFixed(2);
                    document.getElementById('inv-count').innerText = userData.invites || 0;
                    document.getElementById('ref-income').innerText = "₹" + (userData.invites * 3 || 0);
                }
            });
            database.ref('withdrawals').orderByChild('user').equalTo(currentUserEmail).on('value', snap => {
                const list = document.getElementById('history-list'); list.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `<div class="glass p-3 flex justify-between text-[10px] uppercase border border-white/5"><span>${d.date.split(',')[0]}</span><b>₹${d.amount}</b><span class="text-orange-500">${d.status}</span></div>`;
                });
            });
        }

        function shareWhatsApp() {
            const link = document.getElementById('share-link').value;
            window.open("https://wa.me/?text=" + encodeURIComponent("He website-ah hian Captcha chhu in ₹ hlawh rawh le: " + link));
        }
        function copyLink() { const el = document.getElementById('share-link'); el.select(); document.execCommand('copy'); alert("Link Copied!"); }
        function showTab(id) {
            document.getElementById('home-tab').classList.add('hidden-section');
            document.getElementById('spin-tab').classList.add('hidden-section');
            document.getElementById('wallet-tab').classList.add('hidden-section');
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('nav-active', 'text-gray-600'));
            const nId = id === 'home-tab' ? 'n-home' : (id === 'spin-tab' ? 'n-spin' : 'n-wallet');
            document.getElementById(nId).classList.replace('text-gray-600', 'nav-active');
        }
        function startSpin() {
            if ((userData.invites || 0) < 10) return alert("Referral 10 an ngai!");
            const win = [0,1,2,5,10,0,1,3][Math.floor(Math.random() * 8)];
            database.ref('users/' + currentUserEmail).update({ balance: (userData.balance || 0) + win, invites: userData.invites - 10 });
            alert("Won ₹" + win);
        }
    </script>
</body>
                    </html>
