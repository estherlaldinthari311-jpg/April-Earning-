<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>April Premium - Coin Rewards</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #fff; margin: 0; height: 100vh; overflow: hidden; }
        .april-gradient { background: linear-gradient(135deg, #ff0055, #ff8000); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; }
        .hidden-section { display: none !important; }
        #main-app { height: 100vh; display: flex; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .auth-container { width: 100%; max-width: 400px; height: 550px; overflow: hidden; position: relative; }
        .auth-slider { display: flex; width: 200%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .auth-form { width: 50%; padding: 30px; }
        .show-register .auth-slider { transform: translateX(-50%); }
        .nav-active { color: #ff0055; transform: scale(1.2); }
        .captcha-box { background: repeating-linear-gradient(45deg, rgba(255,255,255,0.03), rgba(255,255,255,0.03) 10px, transparent 10px, transparent 20px); }
    </style>
</head>
<body>

    <section id="auth-page" class="h-screen flex items-center justify-center p-6">
        <div id="auth-wrap" class="glass auth-container shadow-2xl">
            <div class="flex border-b border-white/5">
                <button onclick="switchAuth(false)" class="flex-1 py-5 font-bold uppercase text-xs tracking-widest">Login</button>
                <button onclick="switchAuth(true)" class="flex-1 py-5 font-bold uppercase text-xs tracking-widest">Register</button>
            </div>
            <div class="auth-slider">
                <div class="auth-form space-y-5">
                    <h2 class="text-3xl font-black mb-6 mt-4">Welcome</h2>
                    <input type="email" id="l-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <button onclick="handleAuth(true)" class="w-full april-gradient py-4 rounded-2xl font-black shadow-lg">LOGIN</button>
                </div>
                <div class="auth-form space-y-5">
                    <h2 class="text-3xl font-black mb-2 mt-4 text-pink-500 italic">Join Us</h2>
                    <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Signup Bonus: 55 Coins</p>
                    <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <input type="text" id="refBy" placeholder="Referral Code (Optional)" class="w-full bg-white/10 p-4 rounded-2xl outline-none border border-pink-500/20">
                    <button onclick="handleAuth(false)" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase">Create Account</button>
                </div>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section">
        <header class="p-8 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="text-2xl font-black uppercase tracking-tighter italic">April<span class="text-pink-500">Coins</span></h1>
                <p id="app-notice" class="text-[9px] text-yellow-500 font-bold uppercase tracking-widest mt-1 truncate max-w-[150px]">Loading notice...</p>
            </div>
            <div class="bg-white/5 px-5 py-2 rounded-full border border-white/10 flex items-center gap-2">
                <i class="fas fa-coins text-yellow-500"></i>
                <span id="balance" class="font-black text-lg">0</span>
            </div>
        </header>

        <div class="content-area">
            <section id="home-tab" class="px-6 space-y-6">
                <button onclick="claimDaily()" class="w-full glass p-5 flex justify-between items-center border-l-4 border-yellow-500">
                    <div class="text-left">
                        <p class="font-black text-sm uppercase">Daily Check-in</p>
                        <p class="text-[10px] text-gray-400">Claim 5 Coins Every 24h</p>
                    </div>
                    <i class="fas fa-calendar-check text-yellow-500 text-2xl"></i>
                </button>

                <div class="grid grid-cols-2 gap-4">
                    <a href="https://t.me/+ECYBETZqIrg0OGI1" target="_blank" class="glass p-5 text-center border-b-4 border-sky-500">
                        <i class="fab fa-telegram text-2xl text-sky-500 mb-1"></i>
                        <p class="text-[9px] font-bold uppercase">Telegram</p>
                    </a>
                    <a href="https://www.instagram.com/aprilearning_official?igsh=aHQwbGp6a2I4aWQy" target="_blank" class="glass p-5 text-center border-b-4 border-pink-500">
                        <i class="fab fa-instagram text-2xl text-pink-500 mb-1"></i>
                        <p class="text-[9px] font-bold uppercase">Instagram</p>
                    </a>
                </div>

                <div class="glass p-8 text-center relative overflow-hidden">
                    <div class="captcha-box p-10 rounded-[35px] border border-white/10 mb-6 relative">
                        <span id="captcha-code" class="text-4xl font-mono font-black tracking-[15px] text-white opacity-40 italic">LOAD</span>
                        <button onclick="generateCaptcha()" class="absolute right-6 top-6 text-gray-600"><i class="fas fa-sync-alt"></i></button>
                    </div>
                    <input type="text" id="user-input" placeholder="Enter Code" class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl text-center font-bold mb-6 outline-none uppercase text-xl">
                    <a href="https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e" target="_blank" onclick="processCaptcha()">
                        <button class="w-full april-gradient py-5 rounded-2xl font-black uppercase shadow-2xl">Solve & Earn 1.5</button>
                    </a>
                </div>
            </section>

            <section id="refer-tab" class="hidden-section px-6 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-6 text-center"><p class="text-[10px] text-gray-500 uppercase">Invites</p><p id="inv-count" class="text-2xl font-black">0</p></div>
                    <div class="glass p-6 text-center"><p class="text-[10px] text-gray-500 uppercase">Comm.</p><p id="ref-income" class="text-2xl font-black text-green-500">0.0</p></div>
                </div>

                <div class="glass p-6">
                    <p class="text-[10px] font-bold text-gray-400 mb-3 uppercase tracking-widest">Gift Code</p>
                    <div class="flex gap-2">
                        <input type="text" id="gift-input" placeholder="Enter Code" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-xl outline-none uppercase font-bold text-pink-500">
                        <button onclick="claimGift()" class="april-gradient px-6 rounded-xl text-xs font-bold">APPLY</button>
                    </div>
                </div>

                <div class="glass p-8 text-center border-2 border-dashed border-pink-500/20">
                    <p class="text-[10px] text-pink-500 font-black mb-4 uppercase">10 Bonus + 0.4 Commission</p>
                    <div class="bg-black/50 p-4 rounded-2xl mb-6 border border-white/5 truncate text-xs" id="share-link">Loading...</div>
                    <div class="flex gap-2">
                        <button onclick="copyLink()" class="flex-1 bg-white text-black py-4 rounded-2xl font-black text-xs uppercase">Copy</button>
                        <button onclick="shareInvite()" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black text-xs uppercase">Share</button>
                    </div>
                </div>
            </section>

            <section id="wallet-tab" class="hidden-section px-6 space-y-6">
                <div id="w-lock-msg" class="glass p-5 border-l-4 border-red-500 flex items-center gap-4">
                    <i class="fas fa-lock text-red-500"></i>
                    <p class="text-xs font-bold text-red-400 uppercase">2 Invites needed to unlock</p>
                </div>
                <div class="glass p-8 space-y-5">
                    <input type="text" id="upi" placeholder="Your UPI ID" class="w-full bg-white/5 p-5 rounded-2xl outline-none border border-white/10 font-bold">
                    <select id="w-amt" class="w-full bg-white/5 p-5 rounded-2xl outline-none border border-white/10 font-bold">
                        <option value="1000">1000 Coins (₹30)</option>
                        <option value="2000">2000 Coins (₹60)</option>
                    </select>
                    <button id="w-btn" onclick="handleWithdraw()" class="w-full bg-zinc-800 text-gray-600 py-5 rounded-2xl font-black uppercase opacity-50 pointer-events-none">Withdraw Now</button>
                </div>
                <div id="wdr-history" class="space-y-3"></div>
            </section>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-3xl border-t border-white/5 p-6 flex justify-around items-center z-50 rounded-t-[40px] shadow-2xl">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active"><i class="fas fa-th-large text-2xl"></i></button>
            <button onclick="showTab('refer-tab')" id="n-refer" class="text-gray-600"><i class="fas fa-users text-2xl"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-600"><i class="fas fa-wallet text-2xl"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "";
        let userData = {};

        window.onload = () => {
            generateCaptcha();
            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
            loadNotice();
        };

        function loadNotice() {
            database.ref('settings/notice').on('value', snap => {
                document.getElementById('app-notice').innerText = snap.val() || "Welcome to April Premium!";
            });
        }

        function switchAuth(isReg) { document.getElementById('auth-wrap').classList.toggle('show-register', isReg); }

        function handleAuth(isLogin) {
            const email = isLogin ? document.getElementById('l-email').value : document.getElementById('r-email').value;
            const pass = isLogin ? document.getElementById('l-pass').value : document.getElementById('r-pass').value;
            const ref = document.getElementById('refBy').value.trim();
            if(!email || !pass) return alert("Fill all fields");
            const key = email.replace(/[.#$[\]]/g, "_");

            database.ref('users/' + key).once('value', snap => {
                if(isLogin) {
                    if(snap.exists() && snap.val().password === pass) {
                        currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                    } else alert("Invalid Login");
                } else {
                    if(snap.exists()) return alert("User exists");
                    database.ref('users/' + key).set({ 
                        password: pass, balance: 55, invites: 0, commission: 0, 
                        invitedBy: ref, lastDaily: 0, giftUsed: false 
                    });
                    if(ref && ref !== key) {
                        database.ref('users/' + ref).once('value', s => {
                            if(s.exists()) database.ref('users/' + ref).update({ invites: (s.val().invites||0)+1, balance: (s.val().balance||0)+10 });
                        });
                    }
                    currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('share-link').innerText = window.location.origin + window.location.pathname + "?ref=" + currentUser;
            syncData();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val(); if(!userData) return;
                document.getElementById('balance').innerText = Math.floor(userData.balance || 0);
                document.getElementById('inv-count').innerText = userData.invites || 0;
                document.getElementById('ref-income').innerText = (userData.commission || 0).toFixed(1);
                const btn = document.getElementById('w-btn'), lock = document.getElementById('w-lock-msg');
                if((userData.invites || 0) >= 2) {
                    btn.classList.remove('bg-zinc-800','text-gray-600','pointer-events-none','opacity-50');
                    btn.classList.add('april-gradient','text-white');
                    lock.classList.add('hidden-section');
                }
            });
            database.ref('withdrawals').orderByChild('user').equalTo(currentUser).on('value', snap => {
                const hist = document.getElementById('wdr-history'); hist.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    hist.innerHTML += `<div class="glass p-5 flex justify-between items-center text-xs">
                        <div><p class="font-black text-white">${d.upi}</p><p class="text-[9px] text-gray-500 uppercase">${d.status}</p></div>
                        <div class="text-right font-black text-pink-500">₹${(d.amount/33.3).toFixed(0)}</div>
                    </div>`;
                });
            });
        }

        function generateCaptcha() {
            const c = "ABC123XYZ789"; let res = "";
            for(let i=0; i<4; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        async function processCaptcha() {
            if(document.getElementById('user-input').value.toUpperCase() === document.getElementById('captcha-code').innerText) {
                await database.ref('users/' + currentUser).update({ balance: (userData.balance || 0) + 1.5 });
                if(userData.invitedBy) {
                    database.ref('users/' + userData.invitedBy).once('value', s => {
                        if(s.exists()) database.ref('users/' + userData.invitedBy).update({ 
                            balance: (s.val().balance||0)+0.4, commission: (s.val().commission||0)+0.4 
                        });
                    });
                }
                generateCaptcha(); document.getElementById('user-input').value = "";
            }
        }

        function claimDaily() {
            const now = Date.now();
            if(now - (userData.lastDaily || 0) < 86400000) return alert("Already claimed! Wait 24 hours.");
            database.ref('users/' + currentUser).update({ balance: userData.balance + 5, lastDaily: now });
            alert("5 Coins Added to your balance!");
        }

        function claimGift() {
            const code = document.getElementById('gift-input').value.toUpperCase();
            if(code === "APRIL55" && !userData.giftUsed) {
                database.ref('users/' + currentUser).update({ balance: userData.balance + 55, giftUsed: true });
                alert("55 Coins Added!");
            } else alert("Invalid Code or Already used!");
        }

        function handleWithdraw() {
            const amt = parseInt(document.getElementById('w-amt').value);
            const upi = document.getElementById('upi').value;
            if(!upi) return alert("Enter UPI");
            if(userData.balance < amt) return alert("Low balance");
            database.ref('withdrawals').push({ user: currentUser, amount: amt, upi: upi, status: "Pending", date: new Date().toLocaleString() });
            database.ref('users/' + currentUser).update({ balance: userData.balance - amt });
            alert("Success!");
        }

        function showTab(id) {
            ['home-tab', 'refer-tab', 'wallet-tab'].forEach(t => document.getElementById(t).classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('nav-active', 'text-gray-600'));
            const map = {'home-tab':'n-home', 'refer-tab':'n-refer', 'wallet-tab':'n-wallet'};
            document.getElementById(map[id]).classList.replace('text-gray-600', 'nav-active');
        }

        function copyLink() { navigator.clipboard.writeText(document.getElementById('share-link').innerText); alert("Link Copied!"); }
        function shareInvite() { window.open(`whatsapp://send?text=Earn 100+ Coins daily! Use my link to get 55 Coins bonus: ${document.getElementById('share-link').innerText}`); }
    </script>
</body>
                        </html>
