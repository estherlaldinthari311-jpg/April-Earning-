<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>April Premium - Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #fff; margin: 0; height: 100vh; overflow: hidden; }
        .april-gradient { background: linear-gradient(135deg, #ff0055, #ff8000); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; }
        .hidden-section { display: none !important; }
        #main-app { height: 100vh; display: flex; flex-direction: column; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .nav-active { color: #ff0055; transform: scale(1.1); text-shadow: 0 0 10px rgba(255, 0, 85, 0.3); }
        
        .auth-container { width: 100%; max-width: 400px; height: 560px; overflow: hidden; position: relative; z-index: 10; }
        .auth-slider { display: flex; width: 200%; transition: 0.5s ease-in-out; }
        .auth-form { width: 50%; padding: 25px; }
        .show-register .auth-slider { transform: translateX(-50%); }

        button, a { cursor: pointer !important; pointer-events: auto !important; }
    </style>
</head>
<body>

    <section id="auth-page" class="h-screen flex items-center justify-center p-6">
        <div id="auth-wrap" class="glass auth-container shadow-2xl">
            <div class="flex border-b border-white/5">
                <button onclick="switchAuth(false)" class="flex-1 py-5 font-bold uppercase text-[11px] tracking-widest">Login</button>
                <button onclick="switchAuth(true)" class="flex-1 py-5 font-bold uppercase text-[11px] tracking-widest">Register</button>
            </div>
            <div class="auth-slider">
                <div class="auth-form space-y-5">
                    <h2 class="text-3xl font-black mt-4 italic uppercase">Welcome</h2>
                    <input type="email" id="l-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 text-white">
                    <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 text-white">
                    <button onclick="handleAuth(true)" class="w-full april-gradient py-4 rounded-2xl font-black shadow-lg">LOGIN</button>
                </div>
                <div class="auth-form space-y-5">
                    <h2 class="text-3xl font-black mt-4 text-pink-500 italic uppercase">Join Pro</h2>
                    <p class="text-[9px] text-gray-400 font-bold uppercase">Signup Bonus: 55 Coins</p>
                    <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 text-white">
                    <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 text-white">
                    <input type="text" id="refBy" placeholder="Referral Code (Auto)" class="w-full bg-white/10 p-4 rounded-2xl outline-none border border-pink-500/30 text-white">
                    <button onclick="handleAuth(false)" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase">Register Now</button>
                </div>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section">
        <header class="p-8 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="showNotice()" class="w-11 h-11 glass flex items-center justify-center text-yellow-500">
                    <i class="fas fa-bell"></i>
                </button>
                <h1 class="text-2xl font-black uppercase tracking-tighter italic">April<span class="text-pink-500">Coins</span></h1>
            </div>
            <div class="bg-white/5 px-5 py-2 rounded-full border border-white/10 flex items-center gap-2">
                <i class="fas fa-coins text-yellow-500"></i>
                <span id="balance" class="font-black text-lg">0</span>
            </div>
        </header>

        <div class="content-area">
            <section id="home-tab" class="px-6 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <a href="https://fktr.in/0x6se99" target="_blank" class="glass p-5 text-center flex flex-col items-center">
                        <i class="fas fa-shopping-cart text-2xl text-orange-500 mb-2"></i>
                        <p class="text-[10px] font-black uppercase">Earn More</p>
                    </a>
                    <a href="https://topdeal.app.link/VITldpVQk1b" target="_blank" class="glass p-5 text-center flex flex-col items-center">
                        <i class="fas fa-bolt text-2xl text-green-500 mb-2"></i>
                        <p class="text-[10px] font-black uppercase">Top Deal</p>
                    </a>
                </div>

                <button onclick="claimDaily()" class="w-full glass p-5 flex justify-between items-center border-l-4 border-yellow-500">
                    <div class="text-left"><p class="font-black text-sm uppercase">Daily Bonus</p><p class="text-[10px] text-gray-400">+5 Coins Every 24h</p></div>
                    <i class="fas fa-calendar-star text-yellow-500 text-2xl"></i>
                </button>

                <div class="glass p-8 text-center">
                    <div class="p-10 rounded-[35px] bg-white/5 border border-white/10 mb-6 relative">
                        <span id="captcha-code" class="text-4xl font-mono font-black tracking-[15px] opacity-30 italic">LOAD</span>
                        <button onclick="generateCaptcha()" class="absolute right-6 top-6 text-gray-500"><i class="fas fa-sync-alt"></i></button>
                    </div>
                    <input type="text" id="user-input" placeholder="CODE" class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl text-center font-bold mb-6 text-xl text-white outline-none uppercase">
                    <a href="https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e" target="_blank" onclick="processCaptcha()">
                        <button class="w-full april-gradient py-5 rounded-2xl font-black uppercase shadow-xl">Claim 1.5 Coins</button>
                    </a>
                </div>
            </section>

            <section id="refer-tab" class="hidden-section px-6 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-6 text-center font-black"><p class="text-[10px] text-gray-500 uppercase">Invites</p><p id="inv-count">0</p></div>
                    <div class="glass p-6 text-center font-black"><p class="text-[10px] text-gray-500 uppercase">Comm.</p><p id="ref-income" class="text-green-500">0.0</p></div>
                </div>
                <div class="glass p-6">
                    <p class="text-[10px] font-black text-gray-400 mb-4 uppercase text-center">Gift Code</p>
                    <div class="flex gap-2">
                        <input type="text" id="gift-input" placeholder="GIFT NAME" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-xl outline-none font-bold text-pink-500 text-sm uppercase">
                        <button onclick="claimGift()" class="april-gradient px-6 rounded-xl text-xs font-bold uppercase">Apply</button>
                    </div>
                </div>
                <div class="glass p-8 text-center">
                    <p class="text-[10px] text-pink-500 font-black mb-4 uppercase tracking-widest">Share & Earn</p>
                    <div class="bg-black/50 p-4 rounded-2xl mb-6 border border-white/5 truncate text-[9px] font-mono" id="share-link">...</div>
                    <button onclick="copyLink()" class="w-full april-gradient py-4 rounded-2xl font-black text-xs uppercase shadow-lg">Copy Invite Link</button>
                </div>
            </section>

            <section id="leader-tab" class="hidden-section px-6 space-y-4">
                <h2 class="text-center font-black uppercase italic text-pink-500 pt-4">Top 10 Legends</h2>
                <div id="leader-list" class="space-y-2 pb-10"></div>
            </section>

            <section id="wallet-tab" class="hidden-section px-6 space-y-6">
                <div id="w-lock-msg" class="glass p-5 border-l-4 border-red-500 text-[10px] font-black text-red-400 uppercase">
                    <i class="fas fa-lock mr-2"></i> 2 Invites needed to unlock
                </div>
                <div class="glass p-8 space-y-5">
                    <input type="text" id="upi" placeholder="Your UPI ID" class="w-full bg-white/5 p-5 rounded-2xl outline-none border border-white/10 text-white font-bold">
                    <select id="w-amt" class="w-full bg-white/5 p-5 rounded-2xl outline-none border border-white/10 text-white font-bold">
                        <option value="1000">1000 Coins (₹30)</option>
                        <option value="5000">5000 Coins (₹150)</option>
                    </select>
                    <button id="w-btn" onclick="handleWithdraw()" class="w-full bg-zinc-800 text-gray-600 py-5 rounded-2xl font-black uppercase opacity-50 pointer-events-none">Withdraw Now</button>
                </div>
                <div id="wdr-history" class="space-y-2"></div>
            </section>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 p-6 flex justify-around items-center z-50 rounded-t-[40px]">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active"><i class="fas fa-home text-xl"></i></button>
            <button onclick="showTab('refer-tab')" id="n-refer" class="text-gray-600"><i class="fas fa-users text-xl"></i></button>
            <button onclick="showTab('leader-tab')" id="n-leader" class="text-gray-600"><i class="fas fa-crown text-xl"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-600"><i class="fas fa-wallet text-xl"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "", userData = {};

        window.onload = () => {
            generateCaptcha();
            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('ref')) { switchAuth(true); document.getElementById('refBy').value = urlParams.get('ref'); }
        };

        function switchAuth(isReg) { document.getElementById('auth-wrap').classList.toggle('show-register', isReg); }

        function handleAuth(isLogin) {
            const email = isLogin ? document.getElementById('l-email').value : document.getElementById('r-email').value;
            const pass = isLogin ? document.getElementById('l-pass').value : document.getElementById('r-pass').value;
            const ref = document.getElementById('refBy').value.trim();
            if(!email || !pass) return alert("Fill fields!");
            const key = email.replace(/[.#$[\]]/g, "_");

            database.ref('users/' + key).once('value', snap => {
                if(isLogin) {
                    if(snap.exists() && snap.val().password === pass) {
                        currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                    } else alert("Invalid Login");
                } else {
                    if(snap.exists()) return alert("Exists!");
                    database.ref('users/' + key).set({ password: pass, balance: 55, invites: 0, commission: 0, invitedBy: ref, lastDaily: 0, giftUsed: false });
                    if(ref && ref !== key) {
                        database.ref('users/' + ref).once('value', s => {
                            if(s.exists()) database.ref('users/' + ref).update({ invites: (s.val().invites||0)+1, balance: (s.val().balance||0)+10 });
                        });
                    }
                    currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('share-link').innerText = window.location.origin + window.location.pathname + "?ref=" + currentUser;
            syncData();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val(); if(!userData) return;
                document.getElementById('balance').innerText = Math.floor(userData.balance || 0);
                document.getElementById('inv-count').innerText = userData.invites || 0;
                document.getElementById('ref-income').innerText = (userData.commission || 0).toFixed(1);
                if((userData.invites || 0) >= 2) {
                    document.getElementById('w-btn').classList.remove('bg-zinc-800','text-gray-600','pointer-events-none','opacity-50');
                    document.getElementById('w-btn').classList.add('april-gradient','text-white');
                    document.getElementById('w-lock-msg').classList.add('hidden-section');
                }
            });
            database.ref('withdrawals').orderByChild('user').equalTo(currentUser).on('value', snap => {
                const hist = document.getElementById('wdr-history'); hist.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    hist.innerHTML += `<div class="glass p-4 flex justify-between items-center text-[10px] border-l-2 border-pink-500">
                        <div><p class="font-black uppercase">${d.status}</p><p class="text-gray-500">${d.date}</p></div>
                        <p class="font-black">₹${(d.amount/33.3).toFixed(0)}</p>
                    </div>`;
                });
            });
        }

        function claimGift() {
            const code = document.getElementById('gift-input').value.toUpperCase().trim();
            if (!code) return alert("Enter code!");
            database.ref('settings/gift_codes/' + code).once('value', snap => {
                const gift = snap.val();
                if (snap.exists() && gift.active) {
                    const usedCount = gift.used_by ? Object.keys(gift.used_by).length : 0;
                    if (usedCount >= gift.limit) return alert("Code zo tawh!");
                    if (gift.used_by && gift.used_by[currentUser]) return alert("I hmang tawh!");
                    database.ref('users/' + currentUser).update({ balance: (userData.balance||0) + gift.value });
                    database.ref('settings/gift_codes/' + code + '/used_by/' + currentUser).set(true);
                    alert("Claimed " + gift.value + " Coins!");
                } else alert("Invalid Code!");
            });
        }

        function handleWithdraw() {
            const upi = document.getElementById('upi').value;
            const amt = parseInt(document.getElementById('w-amt').value);
            if(!upi) return alert("Enter UPI");
            if(userData.balance < amt) return alert("Low Balance");
            database.ref('withdrawals').push({ user: currentUser, upi: upi, amount: amt, status: "Pending", date: new Date().toLocaleDateString() });
            database.ref('users/' + currentUser).update({ balance: userData.balance - amt });
            alert("Request Sent!");
        }

        function loadLeaderboard() {
            database.ref('users').orderByChild('balance').limitToLast(10).once('value', snap => {
                const list = document.getElementById('leader-list'); list.innerHTML = "";
                let arr = []; snap.forEach(c => { arr.push({id: c.key, ...c.val()}); });
                arr.reverse().forEach((u, i) => {
                    list.innerHTML += `<div class="glass p-4 flex justify-between items-center ${u.id===currentUser?'border-pink-500 bg-pink-500/10':''}">
                        <div class="flex items-center gap-3"><span class="font-black text-pink-500">#${i+1}</span><p class="text-[11px] font-bold">${u.id.replace(/_/g,'.')}</p></div>
                        <p class="font-black text-yellow-500">${Math.floor(u.balance)}</p>
                    </div>`;
                });
            });
        }

        function showTab(id) {
            ['home-tab', 'refer-tab', 'wallet-tab', 'leader-tab'].forEach(t => document.getElementById(t).classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('nav-active', 'text-gray-600'));
            const map = {'home-tab':'n-home','refer-tab':'n-refer','wallet-tab':'n-wallet','leader-tab':'n-leader'};
            document.getElementById(map[id]).classList.replace('text-gray-600', 'nav-active');
            if(id === 'leader-tab') loadLeaderboard();
        }

        function generateCaptcha() {
            const c = "123456789ABCDEF"; let res = "";
            for(let i=0; i<4; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        async function processCaptcha() {
            if(document.getElementById('user-input').value.toUpperCase() === document.getElementById('captcha-code').innerText) {
                database.ref('users/' + currentUser).update({ balance: (userData.balance || 0) + 1.5 });
                if(userData.invitedBy) {
                    database.ref('users/' + userData.invitedBy).once('value', s => {
                        if(s.exists()) database.ref('users/' + userData.invitedBy).update({ balance: (s.val().balance||0)+0.4, commission: (s.val().commission||0)+0.4 });
                    });
                }
                generateCaptcha(); document.getElementById('user-input').value = "";
            }
        }

        function claimDaily() {
            const now = Date.now();
            if(now - (userData.lastDaily || 0) < 86400000) return alert("Wait 24h");
            database.ref('users/' + currentUser).update({ balance: (userData.balance||0)+5, lastDaily: now });
            alert("5 Coins Added!");
        }

        function showNotice() { database.ref('settings/notice').once('value', s => alert(s.val() || "Welcome!")); }
        function copyLink() { navigator.clipboard.writeText(document.getElementById('share-link').innerText); alert("Copied!"); }
    </script>
</body>
                                                                                           </html>
