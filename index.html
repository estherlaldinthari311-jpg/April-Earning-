<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APRIL EARNING</title>
    
    <script src="https://landslidegraphsystems.com/e8/05/8f/e8058f59b323b04bd8e64295ac0638c0.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #fff; margin: 0; overflow-x: hidden; }
        
        .premium-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); border-radius: 24px; }
        .classic-gold { background: linear-gradient(135deg, #ffd700, #b8860b); color: #000; }
        .hidden-section { display: none !important; }
        .nav-active { color: #ffd700; transform: scale(1.1); }
        
        #timer-box { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 200; border-radius: 24px; }
        .timer-active #timer-box { display: flex; }
    </style>
</head>
<body>

    <section id="auth-page" class="min-h-screen flex items-center justify-center p-6">
        <div class="premium-card w-full max-w-sm p-8 text-center animate__animated animate__fadeInUp">
            <h2 class="text-4xl font-black text-yellow-500 mb-8 italic uppercase">APRIL</h2>
            <div id="auth-form" class="space-y-4">
                <input type="email" id="u-email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
                <input type="password" id="u-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
                <div id="signup-fields">
                    <input type="text" id="ref-input" placeholder="Referral Code (Auto-filled)" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none">
                </div>
                <button onclick="processAuth()" class="w-full classic-gold py-4 rounded-2xl font-black uppercase shadow-lg">Login / Sign Up</button>
                <p class="text-[10px] text-gray-500 uppercase mt-4">New users get 55 Pts Bonus</p>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section pb-32">
        <header class="p-6 flex justify-between items-center sticky top-0 bg-[#050507]/90 backdrop-blur-lg z-50">
            <div class="flex items-center gap-3">
                <button onclick="showNotice()" class="text-yellow-500 text-xl"><i class="fas fa-bullhorn"></i></button>
                <h1 class="text-xl font-black italic text-yellow-500">APRIL</h1>
            </div>
            <div class="bg-white/5 px-4 py-2 rounded-full border border-white/10 flex items-center gap-2">
                <i class="fas fa-coins text-yellow-500 text-xs"></i>
                <span id="balance" class="font-bold text-sm">0</span>
            </div>
        </header>

        <section id="home-tab" class="px-6 space-y-6">
            <div class="premium-card p-4 border-l-4 border-yellow-500 flex justify-between items-center">
                <div><p class="font-black text-xs uppercase">Daily Check-in</p><p class="text-[9px] text-gray-500">Get +10 Points Daily</p></div>
                <button onclick="claimDaily()" class="classic-gold px-4 py-2 rounded-xl text-[10px] font-bold">CLAIM</button>
            </div>

            <div id="captcha-box-wrap" class="premium-card p-8 text-center relative overflow-hidden">
                <div id="timer-box">
                    <div class="text-center"><p class="text-5xl font-black text-yellow-500" id="timer-sec">15</p><p class="text-[9px] uppercase text-gray-400">Loading Rewards</p></div>
                </div>
                <div class="bg-black/40 py-10 rounded-3xl mb-4 border border-white/5"><span id="captcha-code" class="text-4xl font-black tracking-[12px] opacity-20 italic">...</span></div>
                <input type="text" id="user-input" placeholder="Enter Captcha" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center font-black mb-4 outline-none uppercase text-yellow-500 text-lg">
                <button onclick="processCaptcha()" class="w-full classic-gold py-4 rounded-2xl font-black uppercase">Verify & Earn 1.5</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="doTask('tg')" class="premium-card p-4 flex flex-col items-center gap-2"><i class="fab fa-telegram text-2xl text-sky-500"></i><span class="text-[9px] font-black uppercase">Telegram</span></button>
                <button onclick="doTask('ig')" class="premium-card p-4 flex flex-col items-center gap-2"><i class="fab fa-instagram text-2xl text-pink-500"></i><span class="text-[9px] font-black uppercase">Instagram</span></button>
            </div>

            <div class="premium-card p-6">
                <p class="text-[10px] text-gray-500 uppercase mb-3 text-center tracking-widest">Redeem Gift Code</p>
                <div class="flex gap-2">
                    <input type="text" id="gift-input" placeholder="GIFT-XXXX" class="flex-1 bg-white/5 border border-white/10 p-3 rounded-xl text-xs outline-none uppercase">
                    <button onclick="redeemGift()" class="classic-gold px-4 py-3 rounded-xl font-bold text-xs uppercase">Apply</button>
                </div>
            </div>
        </section>

        <section id="partner-tab" class="hidden-section px-6 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="premium-card p-6 text-center"><p class="text-[9px] text-gray-500 uppercase">My Referrals</p><p id="inv-count" class="text-3xl font-black">0</p></div>
                <div class="premium-card p-6 text-center"><p class="text-[9px] text-gray-500 uppercase">Commission</p><p id="comm-count" class="text-3xl font-black text-yellow-500">0.0</p></div>
            </div>
            <button onclick="shareWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black uppercase flex items-center justify-center gap-3"><i class="fab fa-whatsapp text-xl"></i> Share Invite Link</button>
        </section>

        <section id="wallet-tab" class="hidden-section px-6 space-y-6">
            <div class="premium-card p-6 space-y-4">
                <p class="text-red-500 text-[9px] font-black uppercase text-center">Minimum 2 Invites Required</p>
                <input type="text" id="upi" placeholder="UPI ID (e.g. name@paytm)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
                <select id="w-amt" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none font-bold text-yellow-500">
                    <option value="1000">1,000 Pts - ₹30</option>
                    <option value="5000">5,000 Pts - ₹150</option>
                    <option value="10000">10,000 Pts - ₹300</option>
                </select>
                <button onclick="handleWithdraw()" class="w-full classic-gold py-4 rounded-2xl font-black uppercase">Withdraw</button>
            </div>
            <div id="wdr-history" class="space-y-2"></div>
        </section>

        <nav class="fixed bottom-6 left-6 right-6 bg-black/80 backdrop-blur-xl border border-white/10 p-4 flex justify-around items-center z-[1000] rounded-[32px] shadow-2xl">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active text-xl"><i class="fas fa-house"></i></button>
            <button onclick="showTab('partner-tab')" id="n-partner" class="text-gray-600 text-xl"><i class="fas fa-users"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-600 text-xl"><i class="fas fa-wallet"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            authDomain: "arpi-earning.firebaseapp.com",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning",
            storageBucket: "arpi-earning.firebasestorage.app",
            messagingSenderId: "427035865345",
            appId: "1:427035865345:web:2c207e1417a49e14a22b00"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "";
        let userData = {};

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const refCode = params.get('ref');
            if(refCode) document.getElementById('ref-input').value = refCode;

            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
        };

        function processAuth() {
            const email = document.getElementById('u-email').value;
            const pass = document.getElementById('u-pass').value;
            const ref = document.getElementById('ref-input').value.trim();
            if(!email || !pass) return alert("Enter credentials!");
            const key = email.replace(/[.#$[\]]/g, "_");
            database.ref('users/' + key).once('value', snap => {
                if(snap.exists()) {
                    if(snap.val().password === pass) { currentUser = key; localStorage.setItem('aprilUser', key); enterApp(); }
                    else alert("Wrong Password!");
                } else {
                    database.ref('users/' + key).set({ password: pass, balance: 55, invites: 0, comm: 0, lastClaim: 0 });
                    if(ref && ref !== key) database.ref('users/'+ref).child('invites').set(firebase.database.ServerValue.increment(1));
                    currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            syncData(); generateCaptcha();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val();
                document.getElementById('balance').innerText = Math.floor(userData.balance);
                document.getElementById('inv-count').innerText = userData.invites || 0;
                document.getElementById('comm-count').innerText = (userData.comm || 0).toFixed(1);
            });
            database.ref('withdrawals').orderByChild('user').equalTo(currentUser).on('value', snap => {
                const hist = document.getElementById('wdr-history'); hist.innerHTML = "";
                snap.forEach(s => {
                    const d = s.val();
                    hist.innerHTML += `<div class="premium-card p-4 flex justify-between items-center text-[10px]">
                        <span>${d.date}</span><b class="text-yellow-500">₹${d.amount/33.3}</b><span class="text-green-500">${d.status}</span>
                    </div>`;
                });
            });
        }

        function claimDaily() {
            const now = Date.now();
            if(now - (userData.lastClaim || 0) < 86400000) return alert("Already claimed today!");
            database.ref('users/' + currentUser).update({ balance: userData.balance + 10, lastClaim: now });
            alert("10 Points added!");
        }

        function processCaptcha() {
            if(document.getElementById('user-input').value.toUpperCase() === document.getElementById('captcha-code').innerText) {
                document.getElementById('captcha-box-wrap').classList.add('timer-active');
                let sec = 15;
                const t = setInterval(() => {
                    sec--; document.getElementById('timer-sec').innerText = sec;
                    if(sec <= 0) { clearInterval(t); document.getElementById('captcha-box-wrap').classList.remove('timer-active'); }
                }, 1000);
                window.location.href = "https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e";
                database.ref('users/' + currentUser).update({ balance: (userData.balance || 0) + 1.5 });
                generateCaptcha(); document.getElementById('user-input').value = "";
            } else alert("Invalid Code!");
        }

        function generateCaptcha() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let res = ""; for(let i=0; i<4; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        function doTask(type) {
            const url = type === 'tg' ? 'https://t.me/+ECYBETZqIrg0OGI1' : 'https://www.instagram.com/aprilearning_official?igsh=aHQwbGp6a2I4aWQy';
            window.open(url);
            if(!userData[type]) database.ref('users/' + currentUser).update({ balance: userData.balance + 20, [type]: true });
        }

        function redeemGift() {
            const code = document.getElementById('gift-input').value.toUpperCase();
            if(code === 'WELCOME50') {
                if(!userData.giftUsed) {
                    database.ref('users/' + currentUser).update({ balance: userData.balance + 50, giftUsed: true });
                    alert("50 Points Added!");
                } else alert("Code already used!");
            } else alert("Invalid Code!");
        }

        function shareWhatsApp() {
            const link = window.location.origin + window.location.pathname + "?ref=" + currentUser;
            window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent("Get 55 Pts Bonus on APRIL EARNING! Join here: " + link));
        }

        function handleWithdraw() {
            if(userData.invites < 2) return alert("You need 2 invites to withdraw!");
            const upi = document.getElementById('upi').value;
            const amt = document.getElementById('w-amt').value;
            if(!upi) return alert("Enter UPI!");
            if(userData.balance < amt) return alert("Low balance!");
            database.ref('withdrawals').push({ user: currentUser, upi: upi, amount: amt, status: 'Pending', date: new Date().toLocaleDateString() });
            database.ref('users/'+currentUser).update({ balance: userData.balance - amt });
            alert("Withdrawal Requested!");
        }

        function showTab(id) {
            ['home-tab', 'partner-tab', 'wallet-tab'].forEach(t => document.getElementById(t).classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('nav-active', 'text-gray-600'));
            const map = {'home-tab':'n-home', 'partner-tab':'n-partner', 'wallet-tab':'n-wallet'};
            document.getElementById(map[id]).classList.replace('text-gray-600', 'nav-active');
        }

        function showNotice() {
            alert("NOTICE:\n• Signup Bonus: 55 Pts\n• Task Bonus: 20 Pts\n• Refer Bonus: 10 Pts\n• Need 2 Invites for payout.");
        }
    </script>
</body>
                    </html>
