<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>April Premium - Classic Edition</title>
    
    <script src="https://landslidegraphsystems.com/e8/05/8f/e8058f59b323b04bd8e64295ac0638c0.js"></script>
    <script src="https://landslidegraphsystems.com/d9/07/49/d90749994ae7e79af413fd864fdead46.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #08090d; color: #e2e8f0; margin: 0; padding: 0; overflow-x: hidden; }
        .classic-gold { background: linear-gradient(135deg, #c5a059, #8e6d2f); color: #000; }
        .premium-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(197, 160, 89, 0.15); backdrop-filter: blur(15px); border-radius: 20px; position: relative; z-index: 10; }
        .hidden-section { display: none !important; }
        .nav-active { color: #c5a059; text-shadow: 0 0 15px rgba(197, 160, 89, 0.6); }
        .captcha-area { background: #000; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Slide Auth Fix */
        .auth-container { position: relative; overflow: hidden; width: 100%; max-width: 400px; min-height: 550px; z-index: 100; }
        .auth-slider { display: flex; width: 200%; transition: 0.5s ease; }
        .auth-form { width: 50%; padding: 30px; box-sizing: border-box; }
        .show-register .auth-slider { transform: translateX(-50%); }
        
        input, select, button { position: relative; z-index: 110; cursor: pointer; }
        nav button { cursor: pointer; padding: 10px; }
    </style>
</head>
<body>

    <section id="auth-page" class="min-h-screen flex items-center justify-center p-6">
        <div id="auth-wrap" class="premium-card auth-container shadow-2xl">
            <div class="flex border-b border-white/5 bg-white/5 relative z-[120]">
                <button onclick="switchAuth(false)" class="flex-1 py-5 font-bold uppercase tracking-widest text-[10px]">Sign In</button>
                <button onclick="switchAuth(true)" class="flex-1 py-5 font-bold uppercase tracking-widest text-[10px]">Create Account</button>
            </div>
            <div class="auth-slider">
                <div class="auth-form space-y-5">
                    <h2 style="font-family: 'Playfair Display';" class="text-3xl text-center text-[#c5a059]">APRIL EARNING</h2>
                    <input type="email" id="l-email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <button onclick="handleAuth(true)" class="w-full classic-gold py-4 rounded-xl font-bold tracking-widest active:scale-95 transition">LOGIN</button>
                </div>
                <div class="auth-form space-y-5">
                    <h2 style="font-family: 'Playfair Display';" class="text-3xl text-center text-[#c5a059]">APRIL EARNING</h2>
                    <input type="email" id="r-email" placeholder="Email Address" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                    <input type="text" id="refBy" placeholder="Referral Code" class="w-full bg-white/10 p-4 rounded-xl border border-gold/30 outline-none text-yellow-500">
                    <button onclick="handleAuth(false)" class="w-full bg-white text-black py-4 rounded-xl font-bold tracking-widest active:scale-95 transition">REGISTER</button>
                </div>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section pb-32">
        <header class="p-6 flex justify-between items-center">
            <h1 style="font-family: 'Playfair Display';" class="text-2xl">April <span class="text-[#c5a059]">Premium</span></h1>
            <div class="flex gap-4 items-center">
                <button onclick="showNotice()" class="text-xl text-[#c5a059]"><i class="fas fa-envelope-open-text"></i></button>
                <div class="premium-card px-4 py-2 border-none bg-white/5 flex items-center gap-2">
                    <i class="fas fa-coins text-[#c5a059]"></i>
                    <span id="balance" class="font-bold">0</span>
                </div>
            </div>
        </header>

        <section id="home-tab" class="px-6">
            <div class="premium-card p-4 mb-6">
                <p class="text-[10px] font-black tracking-widest text-gray-500 uppercase mb-3"><i class="fas fa-crown text-yellow-500 mr-2"></i>Daily Leaderboard</p>
                <div id="leaderboard" class="space-y-2 text-[11px]"></div>
            </div>

            <div class="mb-6 flex justify-center">
                <script type="text/javascript">
                    atOptions = { 'key' : '519ceac42444d69ac28ec1621467ee97', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                </script>
                <script type="text/javascript" src="https://landslidegraphsystems.com/519ceac42444d69ac28ec1621467ee97/invoke.js"></script>
            </div>

            <div class="premium-card p-6 text-center border-gold/30">
                <div class="captcha-area py-8 rounded-2xl mb-4 relative">
                    <span id="captcha-code" class="text-4xl font-black tracking-[12px] italic opacity-60">LOAD...</span>
                    <button onclick="generateCaptcha()" class="absolute top-2 right-2 text-gray-600"><i class="fas fa-sync"></i></button>
                </div>
                <input type="text" id="user-input" placeholder="Type Verification Code" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl text-center font-bold mb-4 outline-none">
                <button onclick="processCaptcha()" class="w-full classic-gold py-4 rounded-xl font-bold active:scale-95 transition">VERIFY & CLAIM</button>
            </div>

            <div class="mt-6 grid grid-cols-2 gap-4">
                <a href="https://fktr.in/N7HSSDa" target="_blank" class="premium-card p-4 text-center"><p class="text-[10px] font-bold">EARNMORE 1</p></a>
                <a href="https://fktr.in/AIzFn34" target="_blank" class="premium-card p-4 text-center"><p class="text-[10px] font-bold">EARNMORE 2</p></a>
            </div>

            <div class="mt-4 space-y-3">
                <div class="premium-card p-4 flex justify-between items-center border-l-4 border-sky-500">
                    <div><p class="text-xs font-bold">Telegram</p><p class="text-[9px] text-gray-500">+20 Coins</p></div>
                    <button onclick="handleSocial('tg', 'https://t.me/+ECYBETZqIrg0OGI1')" class="bg-sky-600 px-4 py-2 rounded-lg text-[9px] font-bold">JOIN</button>
                </div>
            </div>
        </section>

        <section id="refer-tab" class="hidden-section px-6">
            <h2 style="font-family: 'Playfair Display';" class="text-2xl mb-6 text-[#c5a059]">Partnership</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="premium-card p-5 text-center"><p class="text-[9px] uppercase">Invites</p><p id="inv-count" class="text-2xl font-black">0</p></div>
                <div class="premium-card p-5 text-center"><p class="text-[9px] uppercase">Comm.</p><p id="ref-comm" class="text-2xl font-black text-[#c5a059]">0.00</p></div>
            </div>
            <div class="premium-card p-6 mb-6">
                <p class="text-[10px] uppercase mb-3">Redeem Gift Code</p>
                <div class="flex gap-2">
                    <input type="text" id="gift-code" placeholder="Enter Code" class="flex-1 bg-black/40 border border-white/10 p-3 rounded-xl outline-none text-xs">
                    <button onclick="claimGift()" class="bg-white text-black px-6 rounded-xl font-bold text-xs">CLAIM</button>
                </div>
            </div>
            <div class="premium-card p-6 text-center border-dashed">
                <div class="bg-black/50 p-3 rounded-xl text-[9px] mb-4 truncate" id="share-link">Loading...</div>
                <button onclick="copyLink()" class="w-full classic-gold py-4 rounded-xl font-bold text-xs uppercase">Share Link</button>
            </div>
        </section>

        <section id="wallet-tab" class="hidden-section px-6">
            <h2 style="font-family: 'Playfair Display';" class="text-2xl mb-6 text-[#c5a059]">Bank Vault</h2>
            <div class="premium-card p-6 space-y-4">
                <input type="text" id="upi" placeholder="UPI ID" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                <select id="w-amt" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none text-gray-400">
                    <option value="1000">1,000 Coins (₹30)</option>
                    <option value="2000">2,000 Coins (₹60)</option>
                    <option value="5000">5,000 Coins (₹150)</option>
                    <option value="10000">10,000 Coins (₹300)</option>
                </select>
                <button onclick="handleWithdraw()" class="w-full classic-gold py-4 rounded-xl font-bold active:scale-95 transition">REQUEST WITHDRAWAL</button>
            </div>
            <div id="wdr-history" class="mt-8 space-y-3 pb-10"></div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-white/5 p-5 flex justify-around z-[100] rounded-t-[30px]">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active"><i class="fas fa-gem text-xl"></i></button>
            <button onclick="showTab('refer-tab')" id="n-refer" class="text-gray-600"><i class="fas fa-handshake text-xl"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-600"><i class="fas fa-vault text-xl"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            authDomain: "arpi-earning.firebaseapp.com",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning",
            storageBucket: "arpi-earning.firebasestorage.app",
            messagingSenderId: "427035865345",
            appId: "1:427035865345:web:2c207e1417a49e14a22b00"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "";
        let userData = {};

        window.onload = () => {
            generateCaptcha();
            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
            loadLeaderboard();
        };

        function switchAuth(isReg) { 
            const wrap = document.getElementById('auth-wrap');
            if(isReg) wrap.classList.add('show-register');
            else wrap.classList.remove('show-register');
        }

        function handleAuth(isLogin) {
            const email = isLogin ? document.getElementById('l-email').value : document.getElementById('r-email').value;
            const pass = isLogin ? document.getElementById('l-pass').value : document.getElementById('r-pass').value;
            const ref = isLogin ? "" : document.getElementById('refBy').value.trim();
            if(!email || !pass) return alert("Fill all fields");

            const key = email.replace(/[.#$[\]]/g, "_");
            database.ref('users/' + key).once('value', snap => {
                if(isLogin) {
                    if(snap.exists() && snap.val().password === pass) {
                        currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                    } else alert("Invalid credentials");
                } else {
                    if(snap.exists()) return alert("User exists");
                    database.ref('users/' + key).set({ password: pass, balance: 55, invites: 0, invitedBy: ref, commEarnings: 0 });
                    if(ref && ref !== key) {
                        database.ref('users/' + ref).once('value', s => {
                            if(s.exists()) database.ref('users/' + ref).update({ invites: (s.val().invites||0)+1, balance: (s.val().balance||0)+10 });
                        });
                    }
                    currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('share-link').innerText = window.location.origin + window.location.pathname + "?ref=" + currentUser;
            syncData();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val();
                document.getElementById('balance').innerText = Math.floor(userData.balance);
                document.getElementById('inv-count').innerText = userData.invites || 0;
                document.getElementById('ref-comm').innerText = (userData.commEarnings || 0).toFixed(2);
            });
            database.ref('withdrawals').orderByChild('user').equalTo(currentUser).on('value', snap => {
                const h = document.getElementById('wdr-history'); h.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    h.innerHTML += `<div class="premium-card p-4 flex justify-between items-center text-[10px]">
                        <div><p class="font-bold">${d.status}</p><p class="text-gray-500">${d.date.split(',')[0]}</p></div>
                        <p class="font-black text-[#c5a059]">₹${Math.floor(d.amount/33.3)}</p>
                    </div>`;
                });
            });
        }

        function generateCaptcha() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let res = "";
            for(let i=0; i<6; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        function processCaptcha() {
            const input = document.getElementById('user-input').value.toUpperCase();
            if(input === document.getElementById('captcha-code').innerText) {
                window.open("https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e");
                database.ref('users/' + currentUser).update({ balance: userData.balance + 1.5 });
                if(userData.invitedBy) {
                    database.ref('users/' + userData.invitedBy).once('value', s => {
                        if(s.exists()) database.ref('users/' + userData.invitedBy).update({ balance: (s.val().balance||0)+0.12, commEarnings: (s.val().commEarnings||0)+0.12 });
                    });
                }
                generateCaptcha(); document.getElementById('user-input').value = "";
            } else alert("Wrong!");
        }

        function handleWithdraw() {
            const amt = parseInt(document.getElementById('w-amt').value);
            const upi = document.getElementById('upi').value;
            const today = new Date().toLocaleDateString();
            if(!upi) return alert("Enter UPI");
            if(userData.invites < 2) return alert("Need 2 Invites");
            
            database.ref('withdrawals').orderByChild('user').equalTo(currentUser).once('value', snap => {
                let count = 0; snap.forEach(x => { if(x.val().date.includes(today)) count++; });
                if(count >= 3) return alert("Limit 3/day");
                if(userData.balance < amt) return alert("Insufficient coins");
                window.open("https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e");
                database.ref('users/' + currentUser).update({ balance: userData.balance - amt });
                database.ref('withdrawals').push({ user: currentUser, amount: amt, upi: upi, status: "Pending", date: new Date().toLocaleString() });
                alert("Success");
            });
        }

        function showTab(id) {
            ['home-tab', 'refer-tab', 'wallet-tab'].forEach(t => document.getElementById(t).classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('nav-active', 'text-gray-600'));
            const map = {'home-tab':'n-home', 'refer-tab':'n-refer', 'wallet-tab':'n-wallet'};
            document.getElementById(map[id]).classList.replace('text-gray-600', 'nav-active');
        }

        function loadLeaderboard() {
            database.ref('users').orderByChild('balance').limitToLast(5).on('value', snap => {
                const lb = document.getElementById('leaderboard'); lb.innerHTML = "";
                let p = []; snap.forEach(s => p.push({n: s.key.split('_')[0], b: s.val().balance}));
                p.reverse().forEach((x, i) => lb.innerHTML += `<div class="flex justify-between"><span>${i+1}. ${x.n}</span><b>${Math.floor(x.b)}</b></div>`);
            });
        }

        function showNotice() {
            database.ref('app_settings/notice').once('value', s => alert(s.val() || "No notice"));
        }
        function copyLink() { navigator.clipboard.writeText(document.getElementById('share-link').innerText); alert("Copied"); }
    </script>
</body>
    </html>
