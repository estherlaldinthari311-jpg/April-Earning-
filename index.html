<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APRIL EARNING</title>
    
    <script src="https://landslidegraphsystems.com/e8/05/8f/e8058f59b323b04bd8e64295ac0638c0.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #fff; margin: 0; overflow-x: hidden; }
        
        button, input, select, nav, a { position: relative !important; z-index: 50 !important; cursor: pointer !important; }
        .premium-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(197, 160, 89, 0.1); backdrop-filter: blur(15px); border-radius: 20px; }
        .classic-gold { background: linear-gradient(135deg, #c5a059, #8e6d2f); color: #000; }
        .hidden-section { display: none !important; }
        .nav-active { color: #c5a059; transform: scale(1.1); }
        
        #timer-box { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 100; border-radius: 20px; }
        .timer-active #timer-box { display: flex; }

        .rank-card { transition: 0.3s; border-left: 4px solid transparent; }
        .rank-1 { border-left-color: #ffd700; background: rgba(255, 215, 0, 0.05); }
    </style>
</head>
<body>

    <section id="auth-page" class="min-h-screen flex items-center justify-center p-4">
        <div id="auth-wrap" class="premium-card w-full max-w-sm p-8 text-center">
            <h2 class="text-3xl font-black text-yellow-500 mb-6 uppercase italic">April Earning</h2>
            <div class="space-y-4">
                <input type="email" id="u-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                <input type="password" id="u-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                <input type="text" id="refBy" placeholder="Refer Code (Optional)" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                <button onclick="handleAuth()" class="w-full classic-gold py-4 rounded-xl font-black uppercase">Start Earning</button>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section pb-28">
        <div id="top-ad-container" class="flex justify-center p-2 bg-black/50">
            <script type="text/javascript">
                atOptions = {'key':'519ceac42444d69ac28ec1621467ee97','format':'iframe','height':50,'width':320,'params':{}};
            </script>
            <script type="text/javascript" src="https://landslidegraphsystems.com/519ceac42444d69ac28ec1621467ee97/invoke.js"></script>
        </div>

        <header class="p-6 flex justify-between items-center sticky top-0 bg-[#050507]/90 backdrop-blur-lg z-50">
            <h1 class="text-xl font-black italic text-yellow-500">APRIL</h1>
            <div class="flex items-center gap-4">
                <button onclick="showNotice()" class="text-yellow-500"><i class="fas fa-bullhorn"></i></button>
                <div class="bg-white/5 px-4 py-1 rounded-full border border-white/10 flex items-center gap-2">
                    <i class="fas fa-coins text-yellow-500"></i>
                    <span id="balance" class="font-bold">0</span>
                </div>
            </div>
        </header>

        <section id="home-tab" class="px-6 space-y-6">
            <div id="captcha-box-wrap" class="premium-card p-6 text-center relative overflow-hidden">
                <div id="timer-box">
                    <div class="text-center"><p class="text-4xl font-black text-yellow-500" id="timer-sec">15</p><p class="text-[9px] uppercase">Loading Reward Ads...</p></div>
                </div>
                <div class="bg-black/50 py-8 rounded-2xl mb-4 border border-white/5">
                    <span id="captcha-code" class="text-4xl font-black tracking-[8px] opacity-30 italic">LOAD...</span>
                </div>
                <input type="text" id="user-input" placeholder="Type Code" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-center font-bold mb-4 outline-none uppercase">
                <button onclick="processCaptcha()" class="w-full classic-gold py-4 rounded-xl font-black uppercase shadow-lg">Submit & Show Ads</button>
            </div>

            <div>
                <p class="text-[10px] font-black text-gray-500 uppercase mb-4 tracking-widest text-center">Top 3 Earners</p>
                <div id="leaderboard" class="space-y-2"></div>
            </div>
        </section>

        <section id="refer-tab" class="hidden-section px-6 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="premium-card p-4 text-center"><p class="text-[9px] text-gray-500 uppercase">Invites</p><p id="inv-count" class="text-xl font-black">0</p></div>
                <div class="premium-card p-4 text-center"><p class="text-[9px] text-gray-500 uppercase">Comm</p><p id="comm-count" class="text-xl font-black text-yellow-500">0.0</p></div>
            </div>
            <div class="premium-card p-4">
                <p class="text-[10px] text-gray-500 uppercase mb-2">Your Link</p>
                <div class="bg-black/40 p-3 rounded-lg truncate text-[10px] border border-white/5 mb-3" id="share-link">...</div>
                <button onclick="copyLink()" class="w-full bg-white text-black py-3 rounded-xl font-bold text-xs uppercase">Copy Link</button>
            </div>
            <div class="premium-card p-4">
                <p class="text-[10px] text-gray-500 uppercase mb-2">Redeem Gift Code</p>
                <div class="flex gap-2">
                    <input type="text" id="gift-code" placeholder="Code" class="flex-1 bg-white/5 border border-white/10 p-3 rounded-xl text-xs outline-none">
                    <button onclick="redeemGift()" class="classic-gold px-6 py-3 rounded-xl font-bold text-xs uppercase">Apply</button>
                </div>
            </div>
        </section>

        <section id="wallet-tab" class="hidden-section px-6 space-y-6">
            <div class="premium-card p-6 space-y-4">
                <input type="text" id="upi" placeholder="UPI ID (e.g. name@apl)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none text-sm">
                <select id="w-amt" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm">
                    <option value="1000">1,000 Coins (₹30)</option>
                    <option value="5000">5,000 Coins (₹150)</option>
                </select>
                <button onclick="handleWithdraw()" class="w-full classic-gold py-4 rounded-xl font-black uppercase">Withdraw</button>
            </div>
            <div>
                <p class="text-[10px] font-black text-gray-500 uppercase mb-3 tracking-widest">History</p>
                <div id="wdr-history" class="space-y-2"></div>
            </div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/95 border-t border-white/5 p-4 flex justify-around items-center z-[100] rounded-t-3xl backdrop-blur-xl">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active text-xl"><i class="fas fa-home"></i></button>
            <button onclick="showTab('refer-tab')" id="n-refer" class="text-gray-600 text-xl"><i class="fas fa-users"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-600 text-xl"><i class="fas fa-wallet"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            authDomain: "arpi-earning.firebaseapp.com",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning",
            storageBucket: "arpi-earning.firebasestorage.app",
            messagingSenderId: "427035865345",
            appId: "1:427035865345:web:2c207e1417a49e14a22b00"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "";
        let userData = {};

        window.onload = () => {
            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
            loadLeaderboard();
        };

        function handleAuth() {
            const email = document.getElementById('u-email').value;
            const pass = document.getElementById('u-pass').value;
            const ref = document.getElementById('refBy').value.trim();
            if(!email || !pass) return alert("Fill fields");
            const key = email.replace(/[.#$[\]]/g, "_");
            database.ref('users/' + key).once('value', snap => {
                if(snap.exists()) {
                    if(snap.val().password === pass) { currentUser = key; localStorage.setItem('aprilUser', key); enterApp(); }
                    else alert("Wrong password");
                } else {
                    database.ref('users/' + key).set({ password: pass, balance: 50, invites: 0, comm: 0, invitedBy: ref });
                    if(ref) database.ref('users/'+ref).child('invites').set(firebase.database.ServerValue.increment(1));
                    currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('share-link').innerText = window.location.origin + window.location.pathname + "?ref=" + currentUser;
            syncData();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val();
                document.getElementById('balance').innerText = Math.floor(userData.balance);
                document.getElementById('inv-count').innerText = userData.invites || 0;
                document.getElementById('comm-count').innerText = (userData.comm || 0).toFixed(1);
            });
            // WITHDRAW HISTORY
            database.ref('withdrawals').orderByChild('user').equalTo(currentUser).on('value', snap => {
                const hist = document.getElementById('wdr-history'); hist.innerHTML = "";
                snap.forEach(s => {
                    const data = s.val();
                    hist.innerHTML += `<div class="premium-card p-3 flex justify-between items-center text-[10px]">
                        <div><p class="font-bold">${data.upi}</p><p class="opacity-50">${data.date}</p></div>
                        <div class="text-right"><p class="text-yellow-500 font-black">₹${data.amount/33.3}</p><p class="text-green-500">${data.status}</p></div>
                    </div>`;
                });
            });
        }

        function processCaptcha() {
            const input = document.getElementById('user-input').value.toUpperCase();
            if(input === document.getElementById('captcha-code').innerText) {
                document.getElementById('captcha-box-wrap').classList.add('timer-active');
                let sec = 15;
                const t = setInterval(() => {
                    sec--; document.getElementById('timer-sec').innerText = sec;
                    if(sec <= 0) { clearInterval(t); document.getElementById('captcha-box-wrap').classList.remove('timer-active'); }
                }, 1000);

                // TRIGGER ADS
                window.open("https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e");
                
                database.ref('users/' + currentUser).update({ balance: userData.balance + 1.5 });
                if(userData.invitedBy) {
                    database.ref('users/' + userData.invitedBy).update({ 
                        balance: firebase.database.ServerValue.increment(0.3),
                        comm: firebase.database.ServerValue.increment(0.3)
                    });
                }
                generateCaptcha(); document.getElementById('user-input').value = "";
            } else alert("Invalid Code");
        }

        function generateCaptcha() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let res = ""; for(let i=0; i<6; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        function loadLeaderboard() {
            database.ref('users').orderByChild('balance').limitToLast(3).on('value', snap => {
                const lb = document.getElementById('leaderboard'); lb.innerHTML = "";
                let players = []; snap.forEach(s => players.push({ n: s.key.split('_')[0], b: s.val().balance }));
                players.reverse().forEach((p, i) => {
                    lb.innerHTML += `<div class="premium-card p-4 flex justify-between items-center rank-card ${i===0?'rank-1':''}">
                        <span class="text-xs font-bold uppercase">${i+1}. ${p.n}</span>
                        <b class="text-yellow-500 text-xs">${Math.floor(p.b)} pts</b>
                    </div>`;
                });
            });
        }

        function handleWithdraw() {
            const upi = document.getElementById('upi').value;
            const amt = document.getElementById('w-amt').value;
            if(!upi) return alert("Enter UPI");
            if(userData.balance < amt) return alert("Insufficient Balance");
            if(userData.invites < 2) return alert("Need 2 Invites");
            
            database.ref('withdrawals').push({ user: currentUser, upi: upi, amount: amt, status: 'Pending', date: new Date().toLocaleDateString() });
            database.ref('users/'+currentUser).update({ balance: userData.balance - amt });
            alert("Withdrawal Requested!");
        }

        function showTab(id) {
            ['home-tab', 'refer-tab', 'wallet-tab'].forEach(t => document.getElementById(t).classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('nav-active', 'text-gray-600'));
            const map = {'home-tab':'n-home', 'refer-tab':'n-refer', 'wallet-tab':'n-wallet'};
            document.getElementById(map[id]).classList.replace('text-gray-600', 'nav-active');
        }

        function generateCaptcha() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let res = ""; for(let i=0; i<6; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        function showNotice() { alert("Welcome to April Earning! Minimum 2 invites to withdraw."); }
        function copyLink() { navigator.clipboard.writeText(document.getElementById('share-link').innerText); alert("Copied!"); }
        function redeemGift() { alert("Invalid Code"); }
    </script>
</body>
    </html>
