<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APRIL EARNING</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #fff; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* THE "HMEH THEI LO" FIX */
        #auth-page, #main-app, nav, button, input { position: relative !important; z-index: 100 !important; pointer-events: auto !important; cursor: pointer !important; }
        
        .premium-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(197, 160, 89, 0.1); backdrop-filter: blur(15px); border-radius: 20px; }
        .classic-gold { background: linear-gradient(135deg, #c5a059, #8e6d2f); color: #000; }
        .hidden-section { display: none !important; }
        .nav-active { color: #c5a059; transform: scale(1.1); }
        
        /* LEADERBOARD ANIMATION */
        .lb-rank { animation: zoomIn; animation-duration: 0.6s; }
        .rank-1 { background: linear-gradient(90deg, rgba(197, 160, 89, 0.2), transparent); border-left: 4px solid #c5a059; }

        /* AUTH UI */
        .auth-container { width: 100%; max-width: 360px; min-height: 500px; overflow: hidden; margin: auto; }
        .auth-slider { display: flex; width: 200%; transition: 0.5s ease; }
        .auth-form { width: 50%; padding: 25px; }
        .show-register .auth-slider { transform: translateX(-50%); }

        #timer-box { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 200; border-radius: 20px; }
        .timer-active #timer-box { display: flex; }
    </style>
</head>
<body>

    <section id="auth-page" class="min-h-screen flex items-center justify-center p-4">
        <div id="auth-wrap" class="premium-card auth-container shadow-2xl">
            <div class="flex bg-white/5 border-b border-white/5">
                <button onclick="switchAuth(false)" class="flex-1 py-4 font-bold text-[10px] uppercase">Login</button>
                <button onclick="switchAuth(true)" class="flex-1 py-4 font-bold text-[10px] uppercase text-gold">Register</button>
            </div>
            <div class="auth-slider">
                <div class="auth-form space-y-6 pt-10">
                    <div class="text-center"><h2 class="text-3xl font-black text-gold">APRIL</h2><p class="text-[9px] text-gray-500 uppercase">Welcome Back</p></div>
                    <input type="email" id="l-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none text-sm">
                    <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none text-sm">
                    <button onclick="handleAuth(true)" class="w-full classic-gold py-4 rounded-xl font-black">SIGN IN</button>
                </div>
                <div class="auth-form space-y-4 pt-10">
                    <div class="text-center"><h2 class="text-2xl font-black text-gold uppercase">Register</h2><p class="text-[9px] text-green-500 uppercase">Bonus: 55 Coins</p></div>
                    <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none text-sm">
                    <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none text-sm">
                    <input type="text" id="refBy" placeholder="Referral Code" class="w-full bg-white/10 p-4 rounded-xl border border-gold/30 text-yellow-500 text-sm">
                    <button onclick="handleAuth(false)" class="w-full bg-white text-black py-4 rounded-xl font-black">CREATE ACCOUNT</button>
                </div>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section pb-28">
        <header class="p-6 flex justify-between items-center sticky top-0 bg-[#050507]/90 backdrop-blur-lg z-50">
            <h1 class="text-xl font-black italic text-gold">APRIL EARNING</h1>
            <div class="bg-white/5 px-4 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
                <i class="fas fa-coins text-gold text-xs"></i>
                <span id="balance" class="font-bold text-sm">0</span>
            </div>
        </header>

        <section id="home-tab" class="px-6">
            <button onclick="claimDaily()" class="w-full premium-card p-4 mb-6 flex justify-between items-center border-l-4 border-gold">
                <span class="font-bold text-sm">Daily Reward</span>
                <i class="fas fa-gift text-gold"></i>
            </button>

            <div id="captcha-box-wrap" class="premium-card p-6 text-center relative overflow-hidden">
                <div id="timer-box">
                    <div class="text-center"><p class="text-4xl font-black text-gold" id="timer-sec">15</p><p class="text-[9px] uppercase tracking-widest">Syncing Ads...</p></div>
                </div>
                <div class="bg-black/50 py-8 rounded-2xl mb-4 border border-white/5 relative">
                    <span id="captcha-code" class="text-4xl font-black tracking-[8px] opacity-20 italic">LOAD...</span>
                    <button onclick="generateCaptcha()" class="absolute top-2 right-2 text-gray-600"><i class="fas fa-sync"></i></button>
                </div>
                <input type="text" id="user-input" placeholder="Type Code" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-center font-bold mb-4 outline-none uppercase">
                <button onclick="processCaptcha()" class="w-full classic-gold py-4 rounded-xl font-black shadow-lg">CLAIM 1.5 COINS</button>
            </div>

            <div class="mt-6 space-y-3">
                <button onclick="joinSocial('tg')" class="w-full premium-card p-4 flex justify-between items-center border-l-4 border-sky-500">
                    <span class="text-xs font-bold">Join Telegram</span>
                    <span id="tg-btn" class="bg-sky-600 px-4 py-1 rounded-lg text-[10px] font-bold">JOIN +20</span>
                </button>
                <button onclick="joinSocial('ig')" class="w-full premium-card p-4 flex justify-between items-center border-l-4 border-pink-500">
                    <span class="text-xs font-bold">Follow Instagram</span>
                    <span id="ig-btn" class="bg-pink-600 px-4 py-1 rounded-lg text-[10px] font-bold">FOLLOW +20</span>
                </button>
            </div>

            <div class="mt-8">
                <p class="text-[10px] font-black text-gray-500 uppercase mb-4 text-center tracking-widest">Top 3 Earners</p>
                <div id="leaderboard" class="space-y-2"></div>
            </div>
        </section>

        <section id="refer-tab" class="hidden-section px-6">
            <h2 class="text-2xl font-black mb-6">Partner</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="premium-card p-4 text-center"><p class="text-[9px] text-gray-500 uppercase">Invites</p><p id="inv-count" class="text-xl font-black">0</p></div>
                <div class="premium-card p-4 text-center"><p class="text-[9px] text-gray-500 uppercase">Comm</p><p id="comm-count" class="text-xl font-black text-gold">0.0</p></div>
            </div>
            <div class="premium-card p-4 text-center text-[10px] truncate mb-4" id="share-link">...</div>
            <button onclick="copyLink()" class="w-full bg-white text-black py-4 rounded-xl font-bold text-xs uppercase mb-6">Copy Link</button>
            <div class="premium-card p-6">
                <p class="text-xs font-bold mb-4 text-center text-gold">GIFT CODE</p>
                <div class="flex gap-2">
                    <input type="text" id="gift-code" placeholder="Code" class="flex-1 bg-white/5 border border-white/10 p-3 rounded-xl outline-none text-xs">
                    <button onclick="redeemGift()" class="classic-gold px-6 py-3 rounded-xl font-bold text-xs">REDEEM</button>
                </div>
            </div>
        </section>

        <section id="wallet-tab" class="hidden-section px-6">
            <h2 class="text-2xl font-black mb-6">Withdraw</h2>
            <div class="premium-card p-6 space-y-4">
                <input type="text" id="upi" placeholder="UPI ID" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                <select id="w-amt" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none text-sm">
                    <option value="1000">1,000 Coins (₹30)</option>
                    <option value="5000">5,000 Coins (₹150)</option>
                    <option value="10000">10,000 Coins (₹300)</option>
                </select>
                <button onclick="handleWithdraw()" class="w-full classic-gold py-4 rounded-xl font-black">WITHDRAW NOW</button>
            </div>
            <div id="wdr-history" class="mt-6 space-y-2 pb-10"></div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#050507]/95 border-t border-white/5 p-4 flex justify-around items-center z-[100] rounded-t-3xl backdrop-blur-xl">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active text-xl"><i class="fas fa-home"></i></button>
            <button onclick="showTab('refer-tab')" id="n-refer" class="text-gray-600 text-xl"><i class="fas fa-gift"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-600 text-xl"><i class="fas fa-wallet"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            authDomain: "arpi-earning.firebaseapp.com",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning",
            storageBucket: "arpi-earning.firebasestorage.app",
            messagingSenderId: "427035865345",
            appId: "1:427035865345:web:2c207e1417a49e14a22b00"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "";
        let userData = {};

        window.onload = () => {
            generateCaptcha();
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            if(ref) { switchAuth(true); document.getElementById('refBy').value = ref; }

            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
            loadLeaderboard();
        };

        function switchAuth(isReg) { document.getElementById('auth-wrap').classList.toggle('show-register', isReg); }

        function handleAuth(isLogin) {
            const email = isLogin ? document.getElementById('l-email').value : document.getElementById('r-email').value;
            const pass = isLogin ? document.getElementById('l-pass').value : document.getElementById('r-pass').value;
            const ref = document.getElementById('refBy').value.trim();
            if(!email || !pass) return alert("Hming leh Pass ziak rawh");

            const key = email.replace(/[.#$[\]]/g, "_");
            database.ref('users/' + key).once('value', snap => {
                if(isLogin) {
                    if(snap.exists() && snap.val().password === pass) {
                        currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                    } else alert("Email/Password a dik lo");
                } else {
                    if(snap.exists()) return alert("User an awm tawh");
                    database.ref('users/' + key).set({ password: pass, balance: 55, invites: 0, invitedBy: ref, comm: 0, lastClaim: 0 });
                    if(ref && ref !== key) {
                        database.ref('users/' + ref).once('value', s => {
                            if(s.exists()) database.ref('users/' + ref).update({ invites: (s.val().invites||0)+1, balance: (s.val().balance||0)+10 });
                        });
                    }
                    currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('share-link').innerText = window.location.origin + window.location.pathname + "?ref=" + currentUser;
            syncData();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val();
                document.getElementById('balance').innerText = Math.floor(userData.balance);
                document.getElementById('inv-count').innerText = userData.invites || 0;
                document.getElementById('comm-count').innerText = (userData.comm || 0).toFixed(1);
            });
            database.ref('withdrawals').orderByChild('user').equalTo(currentUser).on('value', snap => {
                const hist = document.getElementById('wdr-history'); hist.innerHTML = "";
                snap.forEach(c => {
                    hist.innerHTML += `<div class="premium-card p-3 flex justify-between items-center text-[10px]">
                        <span>${c.val().status}</span><b class="text-gold">₹${Math.floor(c.val().amount/33.3)}</b>
                    </div>`;
                });
            });
        }

        function generateCaptcha() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let res = "";
            for(let i=0; i<6; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        function processCaptcha() {
            const input = document.getElementById('user-input').value.toUpperCase();
            if(input === document.getElementById('captcha-code').innerText) {
                // TIMER FOR ANTI-BLOCK
                document.getElementById('captcha-box-wrap').classList.add('timer-active');
                let sec = 15;
                const t = setInterval(() => {
                    sec--; document.getElementById('timer-sec').innerText = sec;
                    if(sec <= 0) { clearInterval(t); document.getElementById('captcha-box-wrap').classList.remove('timer-active'); }
                }, 1000);

                // DIRECT ADS POPUP
                window.location.href = "https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e";
                
                // ADD COINS
                database.ref('users/' + currentUser).update({ balance: userData.balance + 1.5 });
                if(userData.invitedBy) {
                    database.ref('users/' + userData.invitedBy).once('value', s => {
                        if(s.exists()) database.ref('users/' + userData.invitedBy).update({ balance: (s.val().balance||0)+0.3, comm: (s.val().comm||0)+0.3 });
                    });
                }
                generateCaptcha(); document.getElementById('user-input').value = "";
            } else alert("A dik lo!");
        }

        function loadLeaderboard() {
            database.ref('users').orderByChild('balance').limitToLast(3).on('value', snap => {
                const lb = document.getElementById('leaderboard'); lb.innerHTML = "";
                let p = []; snap.forEach(s => p.push({n: s.key.split('_')[0], b: s.val().balance}));
                p.reverse().forEach((x, i) => {
                    const icon = i===0 ? '🥇' : (i===1 ? '🥈' : '🥉');
                    lb.innerHTML += `<div class="lb-rank premium-card p-4 flex justify-between items-center ${i===0?'rank-1':''} animate__animated animate__zoomIn">
                        <div class="flex items-center gap-3"><span>${icon}</span><span class="font-bold text-xs uppercase">${x.n}</span></div>
                        <b class="text-gold text-xs">${Math.floor(x.b)}</b>
                    </div>`;
                });
            });
        }

        function showTab(id) {
            ['home-tab', 'refer-tab', 'wallet-tab'].forEach(t => document.getElementById(t).classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('nav-active', 'text-gray-600'));
            const map = {'home-tab':'n-home', 'refer-tab':'n-refer', 'wallet-tab':'n-wallet'};
            document.getElementById(map[id]).classList.replace('text-gray-600', 'nav-active');
        }

        function joinSocial(type) {
            const link = type === 'tg' ? 'https://t.me/+ECYBETZqIrg0OGI1' : 'https://instagram.com/aprilearning_official';
            window.open(link);
            if(!userData[type]) {
                database.ref('users/' + currentUser).update({ balance: userData.balance + 20, [type]: true });
            }
        }

        function handleWithdraw() {
            window.location.href = "https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e";
            alert("Sent! Please wait 24h.");
        }
        function copyLink() { navigator.clipboard.writeText(document.getElementById('share-link').innerText); alert("Link Copied!"); }
        function claimDaily() { alert("Claimed!"); }
    </script>

    <div style="text-align:center; margin: 10px 0;">
        <script type="text/javascript">
            atOptions = { 'key' : '519ceac42444d69ac28ec1621467ee97', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://landslidegraphsystems.com/519ceac42444d69ac28ec1621467ee97/invoke.js"></script>
    </div>
</body>
        </html>
