<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>April - Premium Ads Earning</title>
    
    <script src="https://pl28844293.effectivegatecpm.com/e8/05/8f/e8058f59b323b04bd8e64295ac0638c0.js"></script>
    <script async="async" data-cfasync="false" src="https://pl28844431.effectivegatecpm.com/a37aaa93ed45ea8b66f8fb60e58eb230/invoke.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #08080a; color: #fff; margin: 0; }
        .april-gradient { background: linear-gradient(135deg, #ff0055, #ff8000); }
        .glass { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; }
        #loader { display: none; position: fixed; inset: 0; background: #08080a; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .bar-bg { width: 220px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 25px; }
        .bar-fill { width: 0%; height: 100%; background: #ff0055; animation: fill 5s linear forwards; }
        @keyframes fill { to { width: 100%; } }
        .hidden-section { display: none; }
        .nav-active { color: #ff0055; transform: scale(1.1); transition: 0.3s; }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        .ad-container { width: 100%; min-height: 90px; background: rgba(255,255,255,0.02); border-radius: 15px; margin: 15px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; border: 1px dashed rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <audio id="click-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="success-sound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" preload="auto"></audio>

    <div id="loader">
        <div class="w-16 h-16 rounded-2xl april-gradient flex items-center justify-center mb-4 shadow-xl"><span class="text-3xl font-black italic text-white">A</span></div>
        <h2 class="text-lg font-bold tracking-[0.3em] text-pink-500 uppercase">April Earning</h2>
        <div class="bar-bg"><div class="bar-fill"></div></div>
    </div>

    <section id="auth-page" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm shadow-2xl border-t-2 border-pink-500/20">
            <h1 id="auth-title" class="text-4xl font-black mb-2 text-center">Login</h1>
            <p class="text-center text-gray-500 text-xs mb-8 uppercase tracking-widest">Premium Member Only</p>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email Address" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-pink-500 transition-all">
                <input type="password" id="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-pink-500 transition-all">
                <button onclick="handleAuth()" id="auth-btn" class="w-full april-gradient py-4 rounded-2xl font-bold text-lg shadow-xl shadow-pink-500/20 active:scale-95 transition-all">LOGIN</button>
                <div class="text-center mt-4">
                    <button onclick="toggleAuthMode()" id="auth-toggle-btn" class="text-[10px] text-pink-500 font-black uppercase tracking-widest">Don't have an account? Create One</button>
                </div>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section min-h-screen pb-32">
        <section id="home-tab" class="p-6">
            <div class="flex justify-between items-center py-4 mb-4">
                <div><p class="text-gray-500 text-[10px] font-bold uppercase tracking-tighter">Active Member</p><h3 id="user-display" class="text-2xl font-black">User</h3></div>
                <div class="w-10 h-10 rounded-xl glass flex items-center justify-center text-pink-500"><i class="fas fa-gem"></i></div>
            </div>

            <div class="glass p-6 mb-6 relative overflow-hidden april-gradient shadow-lg">
                <p class="text-white/70 text-[10px] font-bold uppercase mb-1">My Balance</p>
                <h2 class="text-4xl font-black text-white">₹<span id="balance">0.00</span></h2>
                <i class="fas fa-wallet absolute -right-2 -bottom-2 text-6xl text-white/10"></i>
            </div>

            <div class="space-y-4">
                <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">Earning Zone</h4>

                <div class="glass p-4 flex justify-between items-center border-l-4 border-orange-500">
                    <div><p class="text-sm font-bold">Watch Video Ads</p><p class="text-[10px] text-gray-500">Reward: ₹0.35 (20s)</p></div>
                    <div class="flex flex-col gap-1">
                        <button onclick="startVideoTask()" id="vid-watch-btn" class="bg-orange-600 text-[9px] font-black px-4 py-1.5 rounded-lg text-center uppercase">WATCH</button>
                        <button onclick="claimVideoReward()" id="vid-verify-btn" class="bg-white/10 text-[9px] font-black px-4 py-1.5 rounded-lg btn-disabled">VERIFY</button>
                    </div>
                </div>

                <div class="glass p-4 flex justify-between items-center border-l-4 border-blue-500">
                    <div><p class="text-sm font-bold">Instagram Follow</p><p class="text-[10px] text-gray-500">Earn ₹2.00</p></div>
                    <div class="flex flex-col gap-1">
                        <a href="https://www.instagram.com/best_nexus?igsh=aHQwbGp6a2I4aWQy" target="_blank" onclick="enableVerify('ig')" class="bg-blue-600 text-[9px] font-black px-4 py-1.5 rounded-lg text-center uppercase">Join</a>
                        <button onclick="verifySocial('ig', 2)" id="ig-btn" class="bg-white/10 text-[9px] font-black px-4 py-1.5 rounded-lg btn-disabled">VERIFY</button>
                    </div>
                </div>

                <div class="glass p-4 flex justify-between items-center border-l-4 border-sky-500">
                    <div><p class="text-sm font-bold">Telegram Join</p><p class="text-[10px] text-gray-500">Earn ₹2.00</p></div>
                    <div class="flex flex-col gap-1">
                        <a href="https://t.me/+ECYBETZqIrg0OGI1" target="_blank" onclick="enableVerify('tg')" class="bg-sky-500 text-[9px] font-black px-4 py-1.5 rounded-lg text-center uppercase">Join</a>
                        <button onclick="verifySocial('tg', 2)" id="tg-btn" class="bg-white/10 text-[9px] font-black px-4 py-1.5 rounded-lg btn-disabled">VERIFY</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="wallet-tab" class="hidden-section p-6 pt-12">
            <h2 class="text-3xl font-black mb-4 tracking-tighter">Withdrawal</h2>
            
            <div class="ad-container relative">
                <span class="text-[8px] text-gray-700 uppercase mb-2">Sponsor Ads</span>
                <div id="container-a37aaa93ed45ea8b66f8fb60e58eb230"></div>
            </div>

            <div class="glass p-6">
                <p class="text-[10px] text-center font-bold text-gray-500 mb-6 uppercase tracking-widest">MIN 5 REFERS: <span id="inv-count" class="text-pink-500">0</span>/5</p>
                <div class="space-y-4">
                    <input type="text" id="upi" placeholder="UPI ID" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-sm focus:border-pink-500 transition-all">
                    <input type="number" id="w-amt" placeholder="Amount (30-130)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-sm focus:border-pink-500 transition-all">
                    <button onclick="handleWithdraw()" class="w-full april-gradient py-4 rounded-2xl font-black text-lg active:scale-95 transition-all shadow-xl shadow-pink-500/10">REQUEST PAYOUT</button>
                </div>
            </div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-3xl border-t border-white/5 p-4 flex justify-around items-center z-50 rounded-t-[35px]">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active text-2xl"><i class="fas fa-th-large"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-600 text-2xl"><i class="fas fa-wallet"></i></button>
            <button onclick="location.reload()" class="text-red-500 text-2xl"><i class="fas fa-power-off"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            authDomain: "arpi-earning.firebaseapp.com",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning",
            storageBucket: "arpi-earning.firebasestorage.app",
            messagingSenderId: "427035865345",
            appId: "1:427035865345:web:2c207e1417a49e14a22b00"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let isLoginMode = true;
        let currentUserEmail = "";
        let userData = { balance: 0, invites: 0, lastClaim: 0 };

        function playSfx(type) {
            const audio = document.getElementById(type === 'click' ? 'click-sound' : 'success-sound');
            audio.currentTime = 0;
            audio.play().catch(e => {});
        }

        function toggleAuthMode() {
            playSfx('click');
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Register";
            document.getElementById('auth-btn').innerText = isLoginMode ? "LOGIN" : "CREATE ACCOUNT";
            document.getElementById('auth-toggle-btn').innerText = isLoginMode ? "Don't have an account? Create One" : "Already have an account? Login";
        }

        function handleAuth() {
            playSfx('click');
            const emailInput = document.getElementById('email').value.trim();
            const passInput = document.getElementById('password').value.trim();
            if(!emailInput.includes('@') || passInput.length < 4) return alert("Fill correctly!");
            
            currentUserEmail = emailInput.replace(/[.#$[\]]/g, "_");
            document.getElementById('loader').style.display = 'flex';
            
            const userRef = database.ref('users/' + currentUserEmail);
            userRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                if (isLoginMode) {
                    if (!data) { document.getElementById('loader').style.display = 'none'; return alert("User not found!"); }
                    if (data.password !== passInput) { document.getElementById('loader').style.display = 'none'; return alert("Wrong Password!"); }
                } else {
                    if (data) { document.getElementById('loader').style.display = 'none'; return alert("User exists!"); }
                    userRef.set({ password: passInput, balance: 0, invites: 0, lastClaim: 0, status: "Active" });
                }
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('auth-page').style.display = 'none';
                    document.getElementById('main-app').classList.remove('hidden-section');
                    document.getElementById('user-display').innerText = emailInput.split('@')[0];
                    playSfx('success');
                    syncData();
                }, 4000);
            });
        }

        function syncData() {
            database.ref('users/' + currentUserEmail).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    if(data.status === "Blocked") { location.reload(); return; }
                    userData = data;
                    document.getElementById('balance').innerText = data.balance.toFixed(2);
                    document.getElementById('inv-count').innerText = data.invites;
                }
            });
        }

        // --- VIDEO TASK (STRICT 20S) ---
        function startVideoTask() {
            playSfx('click');
            // Show mandatory ads when starting video task
            window.open('https://pl28844293.effectivegatecpm.com/e8/05/8f/e8058f59b323b04bd8e64295ac0638c0.js', '_blank');
            
            const watchBtn = document.getElementById('vid-watch-btn');
            const verifyBtn = document.getElementById('vid-verify-btn');
            
            watchBtn.innerText = "VIEWING (20S)...";
            watchBtn.classList.add('btn-disabled');
            
            // Timer logic - cannot be closed/verified until 20s
            setTimeout(() => {
                verifyBtn.classList.remove('btn-disabled');
                verifyBtn.classList.replace('bg-white/10', 'bg-green-600');
                watchBtn.innerText = "READY ✓";
            }, 20000);
        }

        function claimVideoReward() {
            playSfx('success');
            const verifyBtn = document.getElementById('vid-verify-btn');
            const watchBtn = document.getElementById('vid-watch-btn');
            
            database.ref('users/' + currentUserEmail).update({ balance: userData.balance + 0.35 });
            
            verifyBtn.innerText = "CLAIMED ✓";
            verifyBtn.classList.add('btn-disabled');
            verifyBtn.classList.replace('bg-green-600', 'bg-white/10');
            watchBtn.innerText = "WATCH";
            watchBtn.classList.remove('btn-disabled');
            alert("Success! ₹0.35 added.");
        }

        function enableVerify(id) {
            playSfx('click');
            window.open('https://effectivegatecpm.com/e8058f59b323b04bd8e64295ac0638c0', '_blank');
            const btn = document.getElementById(id + '-btn');
            btn.classList.remove('btn-disabled');
            btn.classList.replace('bg-white/10', 'bg-pink-600');
        }

        function verifySocial(type, amt) {
            playSfx('click');
            const btn = document.getElementById(type + '-btn');
            btn.innerText = "WAITING...";
            btn.classList.add('btn-disabled');
            setTimeout(() => {
                database.ref('users/' + currentUserEmail).update({ balance: userData.balance + amt });
                playSfx('success');
                btn.innerText = "DONE ✓";
                btn.className = "bg-green-600 text-[9px] font-black px-4 py-1.5 rounded-lg";
            }, 10000);
        }

        function handleWithdraw() {
            playSfx('click');
            window.open('https://effectivegatecpm.com/e8058f59b323b04bd8e64295ac0638c0', '_blank');
            const amt = parseFloat(document.getElementById('w-amt').value);
            const upi = document.getElementById('upi').value;
            if(userData.invites < 5) return alert("5 Invites required!");
            if(amt < 30 || amt > 130 || amt > userData.balance) return alert("Invalid amount!");
            
            database.ref('users/' + currentUserEmail).update({ balance: userData.balance - amt });
            database.ref('withdrawals').push({
                user: currentUserEmail,
                fullAmount: amt,
                payableAmount: (amt * 0.90).toFixed(2),
                upi: upi,
                status: "Pending",
                date: new Date().toLocaleString()
            });
            playSfx('success');
            alert("Withdrawal Request Sent!");
        }

        function showTab(id) {
            playSfx('click');
            document.getElementById('home-tab').classList.add('hidden-section');
            document.getElementById('wallet-tab').classList.add('hidden-section');
            document.getElementById(id).classList.remove('hidden-section');
            document.getElementById('n-home').classList.replace('nav-active', 'text-gray-600');
            document.getElementById('n-wallet').classList.replace('nav-active', 'text-gray-600');
            const activeNav = id === 'home-tab' ? 'n-home' : 'n-wallet';
            document.getElementById(activeNav).classList.replace('text-gray-600', 'nav-active');
        }
    </script>
</body>
    </html>
