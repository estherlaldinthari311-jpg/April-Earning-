<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>April Premium - Coin Rewards</title>
    
    <script src="https://pl28844683.effectivegatecpm.com/d9/07/49/d90749994ae7e79af413fd864fdead46.js"></script>
    <script async="async" data-cfasync="false" src="https://pl28844431.effectivegatecpm.com/a37aaa93ed45ea8b66f8fb60e58eb230/invoke.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050507; color: #fff; margin: 0; overflow-x: hidden; }
        .april-gradient { background: linear-gradient(135deg, #ff0055, #ff8000); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .hidden-section { display: none !important; }
        .auth-container { position: relative; overflow: hidden; width: 100%; max-width: 400px; height: 500px; }
        .auth-slider { display: flex; width: 200%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .auth-form { width: 50%; padding: 20px; }
        .show-register .auth-slider { transform: translateX(-50%); }
        .captcha-box { background: repeating-linear-gradient(45deg, rgba(255,255,255,0.05), rgba(255,255,255,0.05) 10px, transparent 10px, transparent 20px); }
        .nav-active { color: #ff0055; transform: scale(1.1); }
        button, input, select { position: relative; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>

    <section id="auth-page" class="min-h-screen flex items-center justify-center p-6">
        <div id="auth-wrap" class="glass auth-container shadow-2xl">
            <div class="flex border-b border-white/5">
                <button onclick="switchAuth(false)" class="flex-1 py-4 font-bold uppercase text-xs">Login</button>
                <button onclick="switchAuth(true)" class="flex-1 py-4 font-bold uppercase text-xs">Register</button>
            </div>
            <div class="auth-slider">
                <div class="auth-form space-y-4">
                    <h2 class="text-2xl font-black mb-6">Welcome Back</h2>
                    <input type="email" id="l-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <input type="password" id="l-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <button onclick="handleAuth(true)" class="w-full april-gradient py-4 rounded-2xl font-black">LOGIN</button>
                </div>
                <div class="auth-form space-y-4">
                    <h2 class="text-2xl font-black mb-6 uppercase italic text-pink-500">Free 55 Coins!</h2>
                    <input type="email" id="r-email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <input type="password" id="r-pass" placeholder="Password" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                    <input type="text" id="refBy" placeholder="Referral Code (Optional)" class="w-full bg-white/10 p-4 rounded-2xl outline-none border border-pink-500/30">
                    <button onclick="handleAuth(false)" class="w-full bg-white text-black py-4 rounded-2xl font-black">CREATE ACCOUNT</button>
                </div>
            </div>
        </div>
    </section>

    <main id="main-app" class="hidden-section pb-32">
        <header class="p-6 flex justify-between items-center">
            <h1 class="text-xl font-black uppercase tracking-tighter">April <span class="text-pink-500">Coins</span></h1>
            <div class="flex items-center gap-3">
                <button onclick="showNotice()" class="w-10 h-10 glass flex items-center justify-center text-yellow-500 relative">
                    <i class="fas fa-bell"></i>
                    <span id="notif-dot" class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full hidden"></span>
                </button>
                <div class="bg-white/5 px-4 py-2 rounded-full border border-white/10 flex items-center gap-2">
                    <i class="fas fa-coins text-yellow-500"></i>
                    <span id="balance" class="font-black">0</span>
                </div>
            </div>
        </header>

        <section id="home-tab" class="px-6">
            <div class="glass p-6 mb-6 text-center">
                <p class="text-[10px] font-bold text-pink-500 uppercase mb-4 tracking-widest">Hard Captcha Mining</p>
                
                <div class="mb-4 flex justify-center">
                    <script type="text/javascript">
                        atOptions = { 'key' : '519ceac42444d69ac28ec1621467ee97', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                    </script>
                    <script type="text/javascript" src="https://www.highperformanceformat.com/519ceac42444d69ac28ec1621467ee97/invoke.js"></script>
                </div>

                <div class="captcha-box p-8 rounded-3xl border border-white/10 mb-4 relative overflow-hidden">
                    <span id="captcha-code" class="text-4xl font-mono font-black tracking-[12px] text-white opacity-40 select-none italic">LOAD...</span>
                    <button onclick="generateCaptcha()" class="absolute right-4 top-4 text-gray-500"><i class="fas fa-sync-alt"></i></button>
                </div>
                <input type="text" id="user-input" placeholder="Enter Hard Code" class="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-center font-bold mb-4 outline-none uppercase focus:border-pink-500">
                <button onclick="processCaptcha()" class="w-full april-gradient py-4 rounded-2xl font-black text-xs uppercase shadow-xl">Solve & Earn 1.5 Coins</button>
            </div>

            <button onclick="claimDaily()" class="w-full glass p-5 mb-6 flex justify-between items-center border-l-4 border-green-500">
                <div><p class="font-bold text-sm">Daily Reward</p><p class="text-[10px] text-gray-400">Claim 1.3 Coins Every Day</p></div>
                <i class="fas fa-gift text-green-500 text-xl"></i>
            </button>
        </section>

        <section id="refer-tab" class="hidden-section px-6">
            <h2 class="text-2xl font-black mb-6 text-center">REFERRAL HUB</h2>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="glass p-5 text-center">
                    <p class="text-[9px] text-gray-500 uppercase">Invites</p>
                    <p id="inv-count" class="text-xl font-black">0</p>
                </div>
                <div class="glass p-5 text-center">
                    <p class="text-[9px] text-gray-500 uppercase">Comm. Coins</p>
                    <p id="ref-income" class="text-xl font-black text-green-500">0</p>
                </div>
            </div>
            <div class="glass p-6 border-2 border-dashed border-pink-500/20 text-center">
                <p class="text-xs text-gray-400 mb-6 font-bold">Earn 10 Coins per refer + 0.3 Commission on every solve!</p>
                <div class="bg-black/50 p-4 rounded-xl mb-4 border border-white/5 truncate text-[10px]" id="share-link">Loading...</div>
                <div class="flex gap-2">
                    <button onclick="copyLink()" class="flex-1 bg-white text-black py-3 rounded-xl font-bold text-xs uppercase">Copy</button>
                    <button onclick="shareWhatsApp()" class="flex-1 bg-green-600 py-3 rounded-xl font-bold text-xs uppercase">WhatsApp</button>
                </div>
            </div>
        </section>

        <section id="wallet-tab" class="hidden-section px-6">
            <h2 class="text-2xl font-black mb-4 uppercase">Withdrawal</h2>
            <div id="w-lock-msg" class="glass p-4 mb-6 border-l-4 border-red-500 text-[10px] text-red-400 font-bold uppercase">
                <i class="fas fa-lock mr-2"></i> 2 Invites needed to unlock withdraw
            </div>
            
            <div class="glass p-6 space-y-4 mb-8">
                <input type="text" id="upi" placeholder="UPI ID" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10">
                <select id="w-amt" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 text-gray-400">
                    <option value="1000">1000 Coins (₹30)</option>
                    <option value="2000">2000 Coins (₹60)</option>
                </select>
                <button id="w-btn" onclick="handleWithdraw()" class="w-full bg-zinc-800 text-gray-500 py-4 rounded-2xl font-black uppercase opacity-50 pointer-events-none">WITHDRAW NOW</button>
            </div>

            <h3 class="text-xs font-black text-gray-500 uppercase mb-4">Recent History</h3>
            <div id="wdr-history" class="space-y-2"></div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-3xl border-t border-white/5 p-5 flex justify-around items-center z-50 rounded-t-[35px]">
            <button onclick="showTab('home-tab')" id="n-home" class="nav-active"><i class="fas fa-th-large text-xl"></i></button>
            <button onclick="showTab('refer-tab')" id="n-refer" class="text-gray-500"><i class="fas fa-users text-xl"></i></button>
            <button onclick="showTab('wallet-tab')" id="n-wallet" class="text-gray-500"><i class="fas fa-history text-xl"></i></button>
        </nav>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk3yDT5QoTB6IP84bnklr_5PYXT9Zc9gE",
            databaseURL: "https://arpi-earning-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arpi-earning"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentUser = "";
        let userData = { balance: 0, invites: 0, commission: 0 };

        window.onload = () => {
            generateCaptcha();
            const saved = localStorage.getItem('aprilUser');
            if(saved) { currentUser = saved; enterApp(); }
        };

        function switchAuth(isReg) { document.getElementById('auth-wrap').classList.toggle('show-register', isReg); }

        function handleAuth(isLogin) {
            const email = isLogin ? document.getElementById('l-email').value : document.getElementById('r-email').value;
            const pass = isLogin ? document.getElementById('l-pass').value : document.getElementById('r-pass').value;
            const ref = document.getElementById('refBy').value.trim();
            if(!email || !pass) return alert("Fill all fields");

            const key = email.replace(/[.#$[\]]/g, "_");
            database.ref('users/' + key).once('value', snap => {
                if(isLogin) {
                    if(snap.exists() && snap.val().password === pass) {
                        currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                    } else alert("Invalid Login");
                } else {
                    if(snap.exists()) return alert("User exists");
                    database.ref('users/' + key).set({ password: pass, balance: 55, invites: 0, commission: 0, invitedBy: ref, lastClaim: 0 });
                    if(ref && ref !== key) {
                        database.ref('users/' + ref).once('value', s => {
                            if(s.exists()) database.ref('users/' + ref).update({ invites: (s.val().invites||0)+1, balance: (s.val().balance||0)+10.3 });
                        });
                    }
                    currentUser = key; localStorage.setItem('aprilUser', key); enterApp();
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-page').classList.add('hidden-section');
            document.getElementById('main-app').classList.remove('hidden-section');
            document.getElementById('share-link').innerText = window.location.origin + window.location.pathname + "?ref=" + currentUser;
            syncData();
        }

        function syncData() {
            database.ref('users/' + currentUser).on('value', snap => {
                userData = snap.val(); if(!userData) return;
                document.getElementById('balance').innerText = Math.floor(userData.balance || 0);
                document.getElementById('inv-count').innerText = userData.invites || 0;
                document.getElementById('ref-income').innerText = (userData.commission || 0).toFixed(1);
                
                const btn = document.getElementById('w-btn'), lock = document.getElementById('w-lock-msg');
                if((userData.invites || 0) >= 2) {
                    btn.classList.remove('bg-zinc-800','text-gray-500','pointer-events-none','opacity-50');
                    btn.classList.add('april-gradient','text-white');
                    lock.classList.add('hidden-section');
                }
            });
            database.ref('withdrawals').orderByChild('user').equalTo(currentUser).on('value', snap => {
                const hist = document.getElementById('wdr-history'); hist.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    hist.innerHTML += `<div class="glass p-4 flex justify-between items-center text-[10px]">
                        <div><p class="font-bold">${d.upi}</p><p class="text-gray-500">${d.status}</p></div>
                        <div class="text-right font-black">₹${d.amount/33.3}</div>
                    </div>`;
                });
            });
        }

        function generateCaptcha() {
            const c = "ABC123XYZ789"; let res = "";
            for(let i=0; i<4; i++) res += c.charAt(Math.floor(Math.random()*c.length));
            document.getElementById('captcha-code').innerText = res;
        }

        async function processCaptcha() {
            if(document.getElementById('user-input').value.toUpperCase() === document.getElementById('captcha-code').innerText) {
                window.open("https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e");
                await database.ref('users/' + currentUser).update({ balance: (userData.balance || 0) + 1.5 });
                if(userData.invitedBy) {
                    database.ref('users/' + userData.invitedBy).once('value', s => {
                        if(s.exists()) database.ref('users/' + userData.invitedBy).update({ 
                            balance: (s.val().balance||0)+0.3,
                            commission: (s.val().commission||0)+0.3 
                        });
                    });
                }
                generateCaptcha(); document.getElementById('user-input').value = "";
            } else alert("Wrong!");
        }

        function claimDaily() {
            const now = Date.now();
            if(now - (userData.lastClaim||0) < 86400000) return alert("24 hours later!");
            window.open("https://www.effectivegatecpm.com/cqe02cy3?key=31a8988e6d29708985288e0dedb7cd3e");
            database.ref('users/' + currentUser).update({ balance: (userData.balance || 0) + 1.3, lastClaim: now });
        }

        function handleWithdraw() {
            const amt = parseInt(document.getElementById('w-amt').value);
            const upi = document.getElementById('upi').value;
            if(!upi) return alert("Enter UPI");
            if(userData.balance < amt) return alert("Low balance");
            database.ref('withdrawals').push({ user: currentUser, amount: amt, upi: upi, status: "Pending", date: new Date().toLocaleString() });
            database.ref('users/' + currentUser).update({ balance: userData.balance - amt });
            alert("Success!");
        }

        function showTab(id) {
            ['home-tab', 'refer-tab', 'wallet-tab'].forEach(t => document.getElementById(t).classList.add('hidden-section'));
            document.getElementById(id).classList.remove('hidden-section');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('nav-active', 'text-gray-500'));
            const map = {'home-tab':'n-home', 'refer-tab':'n-refer', 'wallet-tab':'n-wallet'};
            document.getElementById(map[id]).classList.replace('text-gray-500', 'nav-active');
        }

        function showNotice() {
            database.ref('app_settings/notice').once('value', s => alert(s.val() || "Welcome to April Premium!"));
        }

        function copyLink() { navigator.clipboard.writeText(document.getElementById('share-link').innerText); alert("Copied!"); }
        function shareWhatsApp() { window.open("https://wa.me/?text=" + encodeURIComponent("Earn Coins: " + document.getElementById('share-link').innerText)); }
    </script>
</body>
    </html>
